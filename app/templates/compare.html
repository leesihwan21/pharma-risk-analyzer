<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Comparison - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #38bdf8; font-size: 1.4rem; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .lang-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: bold; }
        .lang-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .search-bar { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .search-bar input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; flex: 1 1 180px; min-width: 0; }
        .vs-label { color: #94a3b8; white-space: nowrap; }
        .btn-compare { background: #38bdf8; color: #0f172a; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px 24px; }
        .drug-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .drug-card h2 { font-size: 1.2rem; margin-bottom: 14px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.9rem; gap: 8px; }
        .stat-row:last-child { border-bottom: none; }
        .stat-val { font-weight: bold; color: #38bdf8; text-align: right; }
        .better { color: #34d399 !important; } .worse { color: #f87171 !important; }
        .chart-section { padding: 0 24px 24px; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; margin-bottom: 16px; overflow: hidden; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 안전성 리포트 섹션 */
        .report-section { padding: 0 24px 24px; }
        .report-btn-group { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-report { padding: 10px 24px; background: #10b981; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.92rem; }
        .btn-report:hover { background: #059669; }
        .btn-report.purple { background: #a855f7; }
        .btn-report.purple:hover { background: #9333ea; }
        .report-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 16px; display: none; }
        .report-card.visible { display: block; }
        .report-card h3 { color: #10b981; margin-bottom: 12px; font-size: 1rem; }
        .report-card.purple h3 { color: #a855f7; }
        .report-loading { color: #64748b; font-size: 0.9rem; display: none; }
        .report-loading .spinner2 { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        .report-text { line-height: 1.8; font-size: 0.92rem; color: #e2e8f0; white-space: pre-wrap; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-top: 10px; }
        .btn-pdf { padding: 7px 16px; background: #334155; color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; margin-top: 10px; }
        .btn-pdf:hover { background: #475569; }

        @media (max-width: 768px) { .compare-grid { grid-template-columns: 1fr; padding: 14px 16px; } .chart-section { padding: 0 16px 16px; } .report-section { padding: 0 16px 16px; } }
        @media (max-width: 480px) { .header { padding: 12px 14px; } .search-bar { padding: 14px; flex-direction: column; } .search-bar input { width: 100%; flex: none; } .btn-compare { width: 100%; } }
    </style>
</head>
<body>
{% include 'nav.html' %}
<div class="header">
    <h1 data-ko="⚖️ 약물 비교 분석" data-en="⚖️ Drug Comparison">⚖️ 약물 비교 분석</h1>
    <div class="header-right">
        <button id="lang-btn" class="lang-btn" onclick="toggleLang()">🇺🇸 EN</button>
        <a href="/dashboard" data-ko="← 대시보드로" data-en="← Dashboard">← 대시보드로</a>
    </div>
</div>
<div class="search-bar">
    <input type="text" id="drug1-input" placeholder="약물 1 (예: METHOTREXATE)"/>
    <span class="vs-label">vs</span>
    <input type="text" id="drug2-input" placeholder="약물 2 (예: PREDNISONE)"/>
    <button class="btn-compare" onclick="compareDrugs()">비교 시작</button>
    <span id="compare-status" style="color:#94a3b8; font-size:0.9rem;"></span>
</div>

<div id="compare-result" style="display:none;">
    <div class="compare-grid">
        <div class="drug-card"><h2 id="drug1-name" style="color:#38bdf8;"></h2><div id="stats1"></div></div>
        <div class="drug-card"><h2 id="drug2-name" style="color:#a78bfa;"></h2><div id="stats2"></div></div>
    </div>
    <div class="chart-section">
        <div class="chart-card"><div id="compare-bar-chart"></div></div>
        <div class="chart-card"><div id="compare-reac-chart"></div></div>
    </div>

    <!-- AI 안전성 리포트 섹션 -->
    <div class="report-section">
        <div style="font-size:0.82rem; color:#64748b; margin-bottom:12px;">🧬 AI 안전성 리포트 (FDA FAERS + PubMed + llama3.2)</div>
        <div class="report-btn-group">
            <button class="btn-report" onclick="loadReport(1)">🧬 <span id="btn-drug1-name">약물1</span> 리포트 생성</button>
            <button class="btn-report purple" onclick="loadReport(2)">🧬 <span id="btn-drug2-name">약물2</span> 리포트 생성</button>
        </div>

        <!-- 약물1 리포트 -->
        <div class="report-loading" id="loading1"><span class="spinner2"></span>분석 중... (30~60초)</div>
        <div class="report-card" id="report1">
            <h3 id="report1-title">약물1 안전성 리포트</h3>
            <div class="report-text" id="report1-text"></div>
            <button class="btn-pdf" onclick="downloadPDF(1)">📄 PDF 다운로드</button>
        </div>

        <!-- 약물2 리포트 -->
        <div class="report-loading" id="loading2"><span class="spinner2"></span>분석 중... (30~60초)</div>
        <div class="report-card purple" id="report2">
            <h3 id="report2-title">약물2 안전성 리포트</h3>
            <div class="report-text" id="report2-text"></div>
            <button class="btn-pdf" onclick="downloadPDF(2)">📄 PDF 다운로드</button>
        </div>
    </div>
</div>

<script src="/static/lang.js"></script>
    <script src="/static/pwa.js"></script>
<script>
let currentDrug1 = '';
let currentDrug2 = '';

function compareDrugs() {
    const drug1 = document.getElementById('drug1-input').value.trim().toUpperCase();
    const drug2 = document.getElementById('drug2-input').value.trim().toUpperCase();
    if (!drug1 || !drug2) { alert('약물 2개를 입력해주세요!'); return; }
    currentDrug1 = drug1;
    currentDrug2 = drug2;

    document.getElementById('compare-status').innerHTML = '<div class="spinner"></div>비교 중...';
    fetch(`/api/compare?drug1=${drug1}&drug2=${drug2}`)
    .then(res => res.json())
    .then(data => {
        if (data.error) { document.getElementById('compare-status').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
        document.getElementById('compare-status').innerHTML = '';
        document.getElementById('compare-result').style.display = 'block';

        // 리포트 버튼 이름 업데이트
        document.getElementById('btn-drug1-name').textContent = drug1;
        document.getElementById('btn-drug2-name').textContent = drug2;

        // 리포트 카드 초기화
        document.getElementById('report1').classList.remove('visible');
        document.getElementById('report2').classList.remove('visible');

        const d1 = data.drug1, d2 = data.drug2;
        document.getElementById('drug1-name').textContent = `💊 ${d1.drug}`;
        document.getElementById('drug2-name').textContent = `💊 ${d2.drug}`;

        document.getElementById('stats1').innerHTML = `
            <div class="stat-row"><span style="color:#94a3b8;">총 보고 건수</span><span class="stat-val">${d1.total_reports.toLocaleString()}</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">평균 나이</span><span class="stat-val">${d1.age_avg}세</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">여성 비율</span><span class="stat-val">${d1.female_pct}%</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">남성 비율</span><span class="stat-val">${d1.male_pct}%</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">사망 건수</span><span class="stat-val ${d1.death_cnt > d2.death_cnt ? 'worse':'better'}">${d1.death_cnt.toLocaleString()}</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">입원 건수</span><span class="stat-val ${d1.hosp_cnt > d2.hosp_cnt ? 'worse':'better'}">${d1.hosp_cnt.toLocaleString()}</span></div>`;

        document.getElementById('stats2').innerHTML = `
            <div class="stat-row"><span style="color:#94a3b8;">총 보고 건수</span><span class="stat-val">${d2.total_reports.toLocaleString()}</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">평균 나이</span><span class="stat-val">${d2.age_avg}세</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">여성 비율</span><span class="stat-val">${d2.female_pct}%</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">남성 비율</span><span class="stat-val">${d2.male_pct}%</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">사망 건수</span><span class="stat-val ${d2.death_cnt > d1.death_cnt ? 'worse':'better'}">${d2.death_cnt.toLocaleString()}</span></div>
            <div class="stat-row"><span style="color:#94a3b8;">입원 건수</span><span class="stat-val ${d2.hosp_cnt > d1.hosp_cnt ? 'worse':'better'}">${d2.hosp_cnt.toLocaleString()}</span></div>`;

        Plotly.newPlot('compare-bar-chart', [
            { name: d1.drug, type: 'bar', x: ['총 보고', '사망', '입원'], y: [d1.total_reports, d1.death_cnt, d1.hosp_cnt], marker: { color: '#38bdf8' } },
            { name: d2.drug, type: 'bar', x: ['총 보고', '사망', '입원'], y: [d2.total_reports, d2.death_cnt, d2.hosp_cnt], marker: { color: '#a78bfa' } }
        ], { title: '주요 지표 비교', barmode: 'group', paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b', font: { color: '#e2e8f0' }, height: 360, margin: { t: 50, b: 50 } });

        const allReacs = [...new Set([...d1.top_reactions.map(r => r.reaction), ...d2.top_reactions.map(r => r.reaction)])].slice(0, 10);
        const d1Map = Object.fromEntries(d1.top_reactions.map(r => [r.reaction, r.count]));
        const d2Map = Object.fromEntries(d2.top_reactions.map(r => [r.reaction, r.count]));
        Plotly.newPlot('compare-reac-chart', [
            { name: d1.drug, type: 'bar', x: allReacs, y: allReacs.map(r => d1Map[r] || 0), marker: { color: '#38bdf8' } },
            { name: d2.drug, type: 'bar', x: allReacs, y: allReacs.map(r => d2Map[r] || 0), marker: { color: '#a78bfa' } }
        ], { title: 'Top 부작용 비교', barmode: 'group', paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b', font: { color: '#e2e8f0' }, height: 380, margin: { t: 50, b: 120 }, xaxis: { tickangle: -45 } });
    });
}

async function loadReport(num) {
    const drug = num === 1 ? currentDrug1 : currentDrug2;
    if (!drug) { alert('먼저 약물을 비교해주세요'); return; }

    document.getElementById(`loading${num}`).style.display = 'block';
    document.getElementById(`report${num}`).classList.remove('visible');

    try {
        const res = await fetch('/api/safety_report/' + encodeURIComponent(drug));
        const data = await res.json();
        if (!res.ok) { alert(data.error || '오류 발생'); return; }

        document.getElementById(`report${num}-title`).textContent = `🧬 ${data.drug} 안전성 리포트 (PubMed ${data.pubmed_count}편 참조)`;
        document.getElementById(`report${num}-text`).textContent = data.report;
        document.getElementById(`report${num}`).classList.add('visible');
    } catch(e) {
        alert('서버 오류: ' + e.message);
    } finally {
        document.getElementById(`loading${num}`).style.display = 'none';
    }
}

function downloadPDF(num) {
    const drug = num === 1 ? currentDrug1 : currentDrug2;
    if (!drug) return;
    window.location.href = '/api/safety_report_pdf/' + drug;
}
</script>
</body>
</html>
