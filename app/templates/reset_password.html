<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
        .card h2 { color: #38bdf8; margin-bottom: 8px; font-size: 1.4rem; }
        .card p { color: #64748b; font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.82rem; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; }
        .form-group input:focus { outline: none; border-color: #38bdf8; }
        .btn { width: 100%; padding: 12px; background: #10b981; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #059669; }
        .msg { margin-top: 14px; padding: 12px; border-radius: 8px; font-size: 0.88rem; text-align: center; display: none; }
        .msg.success { background: #0f2620; border: 1px solid #059669; color: #34d399; }
        .msg.error { background: #1f0a0a; border: 1px solid #dc2626; color: #f87171; }
        .error-card { background: #1f0a0a; border: 1px solid #dc2626; border-radius: 8px; padding: 14px; color: #f87171; text-align: center; margin-bottom: 16px; }
        .back { display: block; text-align: center; margin-top: 16px; color: #64748b; font-size: 0.85rem; text-decoration: none; }
        .back:hover { color: #38bdf8; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top: 2px solid #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 비밀번호 재설정</h2>
        {% if error %}
        <div class="error-card">❌ {{ error }}</div>
        <a href="/forgot-password" class="back">← 비밀번호 찾기로 돌아가기</a>
        {% else %}
        <p>새 비밀번호를 입력해주세요. (6자 이상)</p>
        <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" id="password" placeholder="새 비밀번호 입력">
        </div>
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="password2" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter') resetPassword()">
        </div>
        <button class="btn" id="btn" onclick="resetPassword()">🔐 비밀번호 변경</button>
        <div class="msg" id="msg"></div>
        <a href="/login" class="back">← 로그인으로 돌아가기</a>
        {% endif %}
    </div>
    <script>
        const token = '{{ token }}';
        async function resetPassword() {
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            if (!password || !password2) { showMsg('비밀번호를 입력해주세요', 'error'); return; }
            if (password !== password2) { showMsg('비밀번호가 일치하지 않아요', 'error'); return; }
            if (password.length < 6) { showMsg('비밀번호는 6자 이상이어야 해요', 'error'); return; }
            const btn = document.getElementById('btn');
            btn.innerHTML = '<div class="spinner"></div>변경 중...';
            btn.disabled = true;
            try {
                const res = await fetch(`/reset-password/${token}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg(data.message, 'success');
                    btn.innerHTML = '✅ 변경 완료';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showMsg(data.error, 'error');
                    btn.innerHTML = '🔐 비밀번호 변경';
                    btn.disabled = false;
                }
            } catch(e) {
                showMsg('오류가 발생했어요', 'error');
                btn.innerHTML = '🔐 비밀번호 변경';
                btn.disabled = false;
            }
        }
        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = `msg ${type}`;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
