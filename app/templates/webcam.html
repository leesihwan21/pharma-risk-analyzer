<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam - Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #38bdf8; font-size: 1.4rem; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .lang-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: bold; }
        .lang-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .container { padding: 20px 24px; }
        .video-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; text-align: center; max-width: 860px; margin: 0 auto; }
        .video-card h3 { color: #38bdf8; margin-bottom: 16px; font-size: 1.1rem; }
        .video-stream { width: 100%; border-radius: 8px; border: 2px solid #334155; display: block; }
        .controls { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 11px 28px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; flex: 1 1 120px; max-width: 200px; }
        .btn-green { background: #059669; color: white; }
        .btn-red { background: #dc2626; color: white; }
        .status { margin-top: 12px; padding: 10px 16px; border-radius: 8px; background: #0f172a; font-size: 0.9rem; color: #94a3b8; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .header { padding: 12px 14px; } .container { padding: 14px; } .video-card { padding: 14px; } .btn { max-width: 100%; } }
    </style>
</head>
<body>
<div class="header">
    <h1 data-ko="📹 실시간 웹캠 탐지" data-en="📹 Real-time Webcam Detection">📹 실시간 웹캠 탐지</h1>
    <div class="header-right">
        <button id="lang-btn" class="lang-btn" onclick="toggleLang()">🇺🇸 EN</button>
        <a href="/dashboard" data-ko="← 대시보드로" data-en="← Dashboard">← 대시보드로</a>
    </div>
</div>
<div class="container">
    <div class="video-card">
        <h3 data-ko="🔍 YOLOv8 실시간 알약 탐지" data-en="🔍 YOLOv8 Real-time Pill Detection">🔍 YOLOv8 실시간 알약 탐지</h3>
        <img id="video-stream" class="video-stream" src="" alt=""/>
        <div class="controls">
            <button class="btn btn-green" id="btn-start" onclick="startCamera()" data-ko="▶ 카메라 시작" data-en="▶ Start Camera">▶ 카메라 시작</button>
            <button class="btn btn-red" id="btn-stop" onclick="stopCamera()" data-ko="■ 카메라 종료" data-en="■ Stop Camera">■ 카메라 종료</button>
        </div>
        <div class="status" id="status" data-ko="카메라를 시작하려면 버튼을 클릭하세요" data-en="Click the button to start the camera">카메라를 시작하려면 버튼을 클릭하세요</div>
    </div>
</div>
<script src="/static/lang.js"></script>
<script>
    let streaming = false;
    function startCamera() {
        const lang = getLang();
        document.getElementById('status').innerHTML = `<div class="spinner"></div>${lang === 'ko' ? '카메라 연결 중...' : 'Connecting camera...'}`;
        document.getElementById('video-stream').src = '/video_feed';
        streaming = true;
        document.getElementById('status').innerHTML = `✅ <strong style="color:#34d399">${lang === 'ko' ? '실시간 탐지 중' : 'Detecting in real-time'}</strong> — ${lang === 'ko' ? 'YOLOv8이 알약을 탐지하고 있어요' : 'YOLOv8 is detecting pills'}`;
    }
    function stopCamera() {
        const lang = getLang();
        document.getElementById('video-stream').src = '';
        streaming = false;
        fetch('/api/stop_camera').then(res => res.json()).then(() => {
            document.getElementById('status').innerHTML = lang === 'ko' ? '⏹ 카메라가 종료됐어요' : '⏹ Camera stopped';
        });
    }
    window.addEventListener('beforeunload', () => { if (streaming) fetch('/api/stop_camera'); });
</script>
</body>
</html>
