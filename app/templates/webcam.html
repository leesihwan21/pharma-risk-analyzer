html<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 웹캠 탐지 - Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header {
            background: #1e293b;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }
        .header h1 { color: #38bdf8; font-size: 1.5rem; }
        .header a { color: #94a3b8; text-decoration: none; }
        .container { padding: 30px 40px; }
        .video-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .video-card h3 { color: #38bdf8; margin-bottom: 16px; font-size: 1.2rem; }
        .video-stream {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #334155;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-green { background: #059669; color: white; }
        .btn-red { background: #dc2626; color: white; }
        .status {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            background: #0f172a;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #334155;
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>📹 실시간 웹캠 탐지</h1>
    <a href="/dashboard">← 대시보드로</a>
</div>

<div class="container">
    <div class="video-card">
        <h3>🔍 YOLOv8 실시간 알약 탐지</h3>
        <img id="video-stream" class="video-stream"
             src="" alt="카메라를 시작하세요"/>
        <div class="controls">
            <button class="btn btn-green" onclick="startCamera()">▶ 카메라 시작</button>
            <button class="btn btn-red" onclick="stopCamera()">■ 카메라 종료</button>
        </div>
        <div class="status" id="status">카메라를 시작하려면 버튼을 클릭하세요</div>
    </div>
</div>

<script>
    let streaming = false;

    function startCamera() {
        document.getElementById('status').innerHTML =
            '<div class="spinner"></div>카메라 연결 중...';
        document.getElementById('video-stream').src = '/video_feed';
        streaming = true;
        document.getElementById('status').innerHTML =
            '✅ <strong style="color:#34d399">실시간 탐지 중</strong> — YOLOv8이 알약을 탐지하고 있어요';
    }

    function stopCamera() {
        document.getElementById('video-stream').src = '';
        streaming = false;
        fetch('/api/stop_camera')
        .then(res => res.json())
        .then(data => {
            document.getElementById('status').innerHTML =
                '⏹ 카메라가 종료됐어요';
        });
    }

    // 페이지 떠날 때 카메라 종료
    window.addEventListener('beforeunload', () => {
        if (streaming) fetch('/api/stop_camera');
    });
</script>

</body>
</html>
