<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ drugname }} - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header { background: #1e293b; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
        .header h1 { color: #38bdf8; font-size: 1.5rem; }
        .header a { color: #94a3b8; text-decoration: none; }
        .stats-bar { background: #1e293b; padding: 20px 40px; display: flex; gap: 40px; border-bottom: 1px solid #334155; align-items: center; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px 40px; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; min-height: 450px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>💊 {{ drugname }}</h1>
    <a href="/dashboard">← 대시보드로</a>
</div>

<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value">{{ stats.total | int }}</div>
        <div class="stat-label">총 보고 건수</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{ stats.age_avg }}</div>
        <div class="stat-label">평균 나이</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{ stats.age_min }} ~ {{ stats.age_max }}</div>
        <div class="stat-label">나이 범위</div>
    </div>
    <div class="stat-item" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
        <a href="/api/report/{{ drugname }}"
           style="background:#1a56db; color:white; padding:12px 24px; border-radius:8px;
                  text-decoration:none; font-weight:bold; display:inline-block;">
            📄 PDF 다운로드
        </a>
        <button onclick="sendEmail()"
                style="background:#0891b2; color:white; padding:12px 24px; border-radius:8px;
                       border:none; font-weight:bold; cursor:pointer;">
            📧 이메일 발송
        </button>
    </div>
</div>

<!-- 이메일 입력 폼 -->
<div id="email-form" style="display:none; background:#1e293b; padding:16px 40px; border-bottom:1px solid #334155;">
    <input type="email" id="email-input" placeholder="이메일 주소 입력"
           style="background:#0f172a; border:1px solid #334155; color:#e2e8f0;
                  padding:10px 16px; border-radius:8px; width:300px;"/>
    <button onclick="submitEmail()"
            style="background:#0891b2; color:white; border:none; padding:10px 20px;
                   border-radius:8px; cursor:pointer; font-weight:bold; margin-left:8px;">
        발송
    </button>
    <button onclick="document.getElementById('email-form').style.display='none'"
            style="background:#334155; color:#e2e8f0; border:none; padding:10px 20px;
                   border-radius:8px; cursor:pointer; margin-left:8px;">
        취소
    </button>
    <div id="email-result" style="margin-top:8px; font-size:0.9rem;"></div>
</div>

<div class="grid">
    <div class="chart-card" id="chart1"></div>
    <div class="chart-card" id="chart2"></div>
    <div class="chart-card" id="chart3"></div>
    <div class="chart-card" id="chart4"></div>
</div>

<!-- 🕸️ 부작용 네트워크 그래프 -->
<div style="background:#1e293b; margin:0 40px 30px; border-radius:12px; padding:20px; border:1px solid #334155;">
    <h3 style="color:#38bdf8; margin-bottom:16px;">🕸️ 부작용 네트워크 그래프</h3>
    <canvas id="network-canvas" width="800" height="500"
            style="width:100%; background:#0f172a; border-radius:8px;"></canvas>
</div>

<script>
    Plotly.newPlot('chart1', JSON.parse('{{ charts.chart1 | safe }}'));
    Plotly.newPlot('chart2', JSON.parse('{{ charts.chart2 | safe }}'));
    Plotly.newPlot('chart3', JSON.parse('{{ charts.chart3 | safe }}'));
    Plotly.newPlot('chart4', JSON.parse('{{ charts.chart4 | safe }}'));

    // 📧 이메일
    function sendEmail() {
        document.getElementById('email-form').style.display = 'block';
    }

    function submitEmail() {
        const email = document.getElementById('email-input').value;
        if (!email) { alert('이메일을 입력해주세요!'); return; }
        document.getElementById('email-result').innerHTML =
            '<span><div class="spinner"></div>발송 중...</span>';

        fetch(`/api/send_report/{{ drugname }}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('email-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`;
            } else {
                document.getElementById('email-result').innerHTML =
                    `<span style="color:#34d399">✅ ${data.message}</span>`;
            }
        });
    }

    // 🕸️ 네트워크 그래프
    fetch('/api/network/{{ drugname }}')
    .then(res => res.json())
    .then(data => {
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.offsetWidth;
        const H = 500;
        canvas.width = W;

        const nodes = data.nodes;
        const edges = data.edges;
        const centerX = W / 2, centerY = H / 2;
        const radius = Math.min(W, H) * 0.35;

        nodes.forEach((node, i) => {
            if (node.type === 'drug') {
                node.x = centerX; node.y = centerY;
            } else {
                const angle = (2 * Math.PI * (i - 1)) / (nodes.length - 1);
                node.x = centerX + radius * Math.cos(angle);
                node.y = centerY + radius * Math.sin(angle);
            }
        });

        function draw() {
            ctx.clearRect(0, 0, W, H);
            edges.forEach(edge => {
                const src = nodes.find(n => n.id === edge.source);
                const tgt = nodes.find(n => n.id === edge.target);
                const alpha = Math.min(1, edge.weight / 300);
                ctx.beginPath();
                ctx.moveTo(src.x, src.y);
                ctx.lineTo(tgt.x, tgt.y);
                ctx.strokeStyle = `rgba(56, 189, 248, ${alpha})`;
                ctx.lineWidth = Math.max(1, edge.weight / 100);
                ctx.stroke();
            });
            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.size, 0, Math.PI * 2);
                ctx.fillStyle = node.type === 'drug' ? '#f59e0b' : '#7c3aed';
                ctx.fill();
                ctx.strokeStyle = node.type === 'drug' ? '#fbbf24' : '#a78bfa';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#e2e8f0';
                ctx.font = node.type === 'drug' ? 'bold 13px Arial' : '10px Arial';
                ctx.textAlign = 'center';
                const label = node.id.length > 15 ? node.id.substring(0, 13) + '..' : node.id;
                ctx.fillText(label, node.x, node.y + node.size + 14);
            });
        }

        draw();

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (W / rect.width);
            const my = (e.clientY - rect.top) * (H / rect.height);
            draw();
            nodes.forEach(node => {
                const dx = mx - node.x, dy = my - node.y;
                if (Math.sqrt(dx*dx + dy*dy) < node.size + 5) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, node.size + 5, 0, Math.PI * 2);
                    ctx.fillStyle = node.type === 'drug' ? '#fbbf24' : '#a78bfa';
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(node.id, node.x, node.y - node.size - 8);
                }
            });
        });
    });
</script>

</body>
</html>
