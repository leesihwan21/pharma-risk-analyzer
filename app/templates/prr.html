<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRR Signal Detection - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #38bdf8; font-size: 1.4rem; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .lang-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: bold; }
        .lang-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .info-bar { background: #1e293b; padding: 14px 24px; border-bottom: 1px solid #334155; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .info-badge { background: #0f172a; border: 1px solid #334155; padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; }
        .badge-red { color: #f87171; } .badge-yellow { color: #fde68a; } .badge-gray { color: #94a3b8; }
        .search-bar { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .search-bar input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; flex: 1 1 200px; min-width: 0; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .btn-blue { background: #38bdf8; color: #0f172a; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 24px 0; }
        .summary-card { background: #1e293b; border-radius: 10px; padding: 16px; border: 1px solid #334155; text-align: center; }
        .summary-card .val { font-size: 1.8rem; font-weight: bold; }
        .summary-card .lbl { color: #94a3b8; font-size: 0.82rem; margin-top: 4px; }
        .chart-section { padding: 16px 24px 0; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; overflow: hidden; }
        .table-wrap { padding: 16px 24px 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 800px; }
        th { background: #1e293b; color: #94a3b8; padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        tr:hover td { background: #1e293b; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; }
        .badge-signal-strong { background: #7f1d1d; color: #fca5a5; }
        .badge-signal { background: #713f12; color: #fde68a; }
        .badge-no-signal { background: #1e293b; color: #94a3b8; }
        .prr-bar { height: 8px; border-radius: 4px; background: #334155; position: relative; min-width: 60px; }
        .prr-bar-fill { height: 100%; border-radius: 4px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .filter-tabs { display: flex; gap: 8px; padding: 16px 24px 0; flex-wrap: wrap; }
        .filter-tab { padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; border: 1px solid #334155; color: #94a3b8; background: transparent; transition: all 0.2s; }
        .filter-tab.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: bold; }
        @media (max-width: 768px) { .summary-grid { grid-template-columns: repeat(2, 1fr); padding: 14px 16px 0; } .chart-section { padding: 14px 16px 0; } .table-wrap { padding: 12px 16px 16px; } }
        @media (max-width: 480px) { .header { padding: 12px 14px; } .info-bar { padding: 12px 14px; } .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="header">
    <h1 data-ko="📡 PRR 신호 탐지" data-en="📡 PRR Signal Detection">📡 PRR 신호 탐지</h1>
    <div class="header-right">
        <button id="lang-btn" class="lang-btn" onclick="toggleLang()">🇺🇸 EN</button>
        <a href="/dashboard" data-ko="← 대시보드로" data-en="← Dashboard">← 대시보드로</a>
    </div>
</div>
<div class="info-bar">
    <div class="info-badge"><span class="badge-red">🔴 <span data-ko="강한 신호" data-en="Strong Signal">강한 신호</span></span>: PRR ≥ 5, n ≥ 3</div>
    <div class="info-badge"><span class="badge-yellow">🟡 <span data-ko="신호" data-en="Signal">신호</span></span>: PRR ≥ 2, n ≥ 3</div>
    <div class="info-badge"><span class="badge-gray">⚪ <span data-ko="비신호" data-en="No Signal">비신호</span></span>: PRR &lt; 2</div>
    <div class="info-badge" style="color:#94a3b8;">Evans <span data-ko="기준 (FDA/EMA 사용)" data-en="Criteria (FDA/EMA)">기준 (FDA/EMA 사용)</span></div>
</div>
<div class="search-bar">
    <input type="text" id="drug-input" data-ko="약물명 입력 (예: METHOTREXATE)" data-en="Enter drug name (e.g. METHOTREXATE)" placeholder="약물명 입력 (예: METHOTREXATE)" onkeydown="if(event.key==='Enter') calculatePRR()"/>
    <button class="btn btn-blue" onclick="calculatePRR()" data-ko="🔍 PRR 계산" data-en="🔍 Calculate PRR">🔍 PRR 계산</button>
    <span id="status" style="color:#94a3b8; font-size:0.88rem;"></span>
</div>
<div id="summary-section" style="display:none;">
    <div class="summary-grid">
        <div class="summary-card"><div class="val" id="s-drug" style="color:#38bdf8;">-</div><div class="lbl" data-ko="분석 약물" data-en="Drug">분석 약물</div></div>
        <div class="summary-card"><div class="val" id="s-total" style="color:#38bdf8;">-</div><div class="lbl" data-ko="총 보고 건수" data-en="Total Reports">총 보고 건수</div></div>
        <div class="summary-card"><div class="val" id="s-signal" style="color:#fde68a;">-</div><div class="lbl" data-ko="🟡 신호 감지" data-en="🟡 Signals">🟡 신호 감지</div></div>
        <div class="summary-card"><div class="val" id="s-strong" style="color:#f87171;">-</div><div class="lbl" data-ko="🔴 강한 신호" data-en="🔴 Strong Signals">🔴 강한 신호</div></div>
    </div>
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterResults('all', this)" data-ko="전체" data-en="All">전체</button>
        <button class="filter-tab" onclick="filterResults('signal', this)" data-ko="🟡 신호 이상" data-en="🟡 Signal+">🟡 신호 이상</button>
        <button class="filter-tab" onclick="filterResults('strong', this)" data-ko="🔴 강한 신호만" data-en="🔴 Strong Only">🔴 강한 신호만</button>
    </div>
    <div class="chart-section"><div class="chart-card"><div id="prr-chart"></div></div></div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th data-ko="부작용" data-en="Adverse Reaction">부작용</th>
                    <th data-ko="약물 건수" data-en="Drug Count">약물 건수</th>
                    <th data-ko="약물 비율" data-en="Drug %">약물 비율</th>
                    <th data-ko="기타 비율" data-en="Other %">기타 비율</th>
                    <th>PRR</th>
                    <th>95% CI</th>
                    <th data-ko="PRR 시각화" data-en="PRR Bar">PRR 시각화</th>
                    <th data-ko="신호" data-en="Signal">신호</th>
                </tr>
            </thead>
            <tbody id="prr-tbody"></tbody>
        </table>
    </div>
</div>
<div id="empty-state" class="empty-state">
    <div class="icon">📡</div>
    <div style="font-size:1.1rem; color:#64748b; margin-bottom:8px;" data-ko="약물명을 입력하고 PRR을 계산해보세요" data-en="Enter a drug name to calculate PRR">약물명을 입력하고 PRR을 계산해보세요</div>
    <div style="font-size:0.85rem; color:#475569;" data-ko="PRR은 FDA와 EMA에서 실제로 사용하는 약물 부작용 신호 탐지 지표예요." data-en="PRR is a pharmacovigilance signal detection metric used by FDA and EMA.">PRR은 FDA와 EMA에서 실제로 사용하는 약물 부작용 신호 탐지 지표예요.</div>
</div>
<script src="/static/lang.js"></script>
<script>
    let allResults = [];

    function calculatePRR() {
        const drug = document.getElementById('drug-input').value.trim();
        const lang = getLang();
        if (!drug) { alert(lang === 'ko' ? '약물명을 입력해주세요!' : 'Please enter a drug name!'); return; }
        document.getElementById('status').innerHTML = `<div class="spinner"></div>${lang === 'ko' ? '계산 중...' : 'Calculating...'}`;
        document.getElementById('summary-section').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
        fetch(`/api/prr/${drug}`)
        .then(res => res.json())
        .then(data => {
            if (data.error) { document.getElementById('status').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; document.getElementById('empty-state').style.display = 'block'; return; }
            document.getElementById('status').innerHTML = `✅ <strong style="color:#34d399">${data.drugname}</strong> ${lang === 'ko' ? '분석 완료' : 'analysis complete'}`;
            document.getElementById('summary-section').style.display = 'block';
            document.getElementById('s-drug').textContent = data.drugname;
            document.getElementById('s-total').textContent = data.total_reports.toLocaleString();
            document.getElementById('s-signal').textContent = data.signal_count;
            document.getElementById('s-strong').textContent = data.strong_signal_count;
            allResults = data.results;
            renderTable(allResults, lang);
            renderChart(allResults.slice(0, 15), data.drugname, lang);
        });
    }

    function filterResults(type, btn) {
        const lang = getLang();
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        let filtered;
        if (type === 'strong') filtered = allResults.filter(r => r.prr >= 5 && r.drug_count >= 3);
        else if (type === 'signal') filtered = allResults.filter(r => r.is_signal);
        else filtered = allResults;
        renderTable(filtered, lang);
    }

    function renderTable(results, lang) {
        lang = lang || getLang();
        const tbody = document.getElementById('prr-tbody');
        if (results.length === 0) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:30px; color:#475569;">${lang === 'ko' ? '해당 조건의 결과가 없어요' : 'No results for this filter'}</td></tr>`; return; }
        const maxPRR = Math.max(...results.map(r => r.prr));
        const signalLabels = lang === 'ko'
            ? { strong: '🔴 강한 신호', signal: '🟡 신호', none: '⚪ 비신호' }
            : { strong: '🔴 Strong', signal: '🟡 Signal', none: '⚪ None' };
        tbody.innerHTML = results.map(r => {
            const barWidth = Math.min(100, (r.prr / Math.max(maxPRR, 5)) * 100);
            const barColor = r.prr >= 5 ? '#f87171' : r.prr >= 2 ? '#fde68a' : '#64748b';
            const signalCls = r.prr >= 5 && r.drug_count >= 3 ? 'badge-signal-strong' : r.is_signal ? 'badge-signal' : 'badge-no-signal';
            const signalLabel = r.prr >= 5 && r.drug_count >= 3 ? signalLabels.strong : r.is_signal ? signalLabels.signal : signalLabels.none;
            return `<tr>
                <td><strong>${r.reaction}</strong></td>
                <td style="color:#38bdf8;">${r.drug_count.toLocaleString()}</td>
                <td>${r.drug_pct}%</td>
                <td style="color:#94a3b8;">${r.other_pct}%</td>
                <td><strong style="color:${r.prr >= 5 ? '#f87171' : r.prr >= 2 ? '#fde68a' : '#e2e8f0'}">${r.prr}</strong></td>
                <td style="color:#94a3b8; font-size:0.82rem;">${r.prr_lower} ~ ${r.prr_upper}</td>
                <td style="min-width:80px;"><div class="prr-bar"><div class="prr-bar-fill" style="width:${barWidth}%; background:${barColor};"></div></div></td>
                <td><span class="badge ${signalCls}">${signalLabel}</span></td>
            </tr>`;
        }).join('');
    }

    function renderChart(results, drugname, lang) {
        lang = lang || getLang();
        const signals = results.filter(r => r.is_signal);
        const nonSignals = results.filter(r => !r.is_signal);
        const title = lang === 'ko' ? `${drugname} - PRR 신호 탐지 (Top 15 부작용)` : `${drugname} - PRR Signal Detection (Top 15)`;
        Plotly.newPlot('prr-chart', [
            { name: lang === 'ko' ? '🟡 신호' : '🟡 Signal', x: signals.map(r => r.prr), y: signals.map(r => r.reaction), type: 'bar', orientation: 'h', marker: { color: '#fde68a' }, text: signals.map(r => `PRR: ${r.prr}`), textposition: 'outside' },
            { name: lang === 'ko' ? '⚪ 비신호' : '⚪ No Signal', x: nonSignals.map(r => r.prr), y: nonSignals.map(r => r.reaction), type: 'bar', orientation: 'h', marker: { color: '#334155' }, text: nonSignals.map(r => `PRR: ${r.prr}`), textposition: 'outside' }
        ], {
            title, paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b',
            font: { color: '#e2e8f0', size: 11 },
            height: Math.max(400, results.length * 30 + 100),
            margin: { t: 50, b: 50, l: 200, r: 100 },
            xaxis: { title: 'PRR', gridcolor: '#334155', zerolinecolor: '#334155' },
            yaxis: { gridcolor: '#334155' }, barmode: 'overlay', showlegend: true,
        });
    }
</script>
</body>
</html>
