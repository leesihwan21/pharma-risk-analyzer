<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Manager - Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }

        /* 헤더 */
        .header {
            background: #1e293b; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px;
        }
        .header h1 { color: #38bdf8; font-size: 1.4rem; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }

        /* 요약 카드 */
        .summary-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; padding: 20px 24px;
        }
        .summary-card {
            background: #1e293b; border-radius: 10px;
            padding: 16px; border: 1px solid #334155; text-align: center;
        }
        .summary-card .val { font-size: 2rem; font-weight: bold; }
        .summary-card .lbl { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }
        .val-blue   { color: #38bdf8; }
        .val-red    { color: #f87171; }
        .val-orange { color: #fb923c; }
        .val-green  { color: #34d399; }
        .val-purple { color: #a78bfa; }

        /* 탭 */
        .tabs {
            display: flex; gap: 4px;
            padding: 0 24px; border-bottom: 1px solid #334155;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 18px; cursor: pointer;
            color: #94a3b8; font-size: 0.9rem; border-bottom: 2px solid transparent;
            transition: color 0.2s;
        }
        .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        .tab:hover { color: #e2e8f0; }

        /* 필터 바 */
        .filter-bar {
            background: #1e293b; padding: 14px 24px;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            border-bottom: 1px solid #334155;
        }
        .filter-bar select, .filter-bar input {
            background: #0f172a; border: 1px solid #334155;
            color: #e2e8f0; padding: 8px 12px; border-radius: 8px; font-size: 0.88rem;
        }
        .btn { border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.88rem; white-space: nowrap; }
        .btn-blue   { background: #38bdf8; color: #0f172a; }
        .btn-green  { background: #059669; color: white; }
        .btn-red    { background: #dc2626; color: white; }
        .btn-gray   { background: #334155; color: #e2e8f0; }
        .btn-orange { background: #d97706; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

        /* AE 테이블 */
        .table-wrap { padding: 16px 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 900px; }
        th {
            background: #1e293b; color: #94a3b8;
            padding: 10px 12px; text-align: left;
            border-bottom: 1px solid #334155; white-space: nowrap;
        }
        td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        tr:hover td { background: #1e293b; }

        /* 뱃지 */
        .badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 20px; font-size: 0.78rem; font-weight: bold; white-space: nowrap;
        }
        .badge-sae     { background: #7f1d1d; color: #fca5a5; }
        .badge-ae      { background: #1e3a5f; color: #93c5fd; }
        .badge-g1      { background: #164e63; color: #67e8f9; }
        .badge-g2      { background: #713f12; color: #fde68a; }
        .badge-g3      { background: #7c2d12; color: #fdba74; }
        .badge-g4      { background: #7f1d1d; color: #fca5a5; }
        .badge-g5      { background: #450a0a; color: #f87171; }
        .badge-overdue { background: #7f1d1d; color: #fca5a5; }
        .badge-urgent  { background: #7c2d12; color: #fdba74; }
        .badge-warning { background: #713f12; color: #fde68a; }
        .badge-normal  { background: #14532d; color: #86efac; }
        .badge-submitted { background: #1e3a5f; color: #93c5fd; }
        .badge-no_deadline { background: #1e293b; color: #94a3b8; }

        /* 모달 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1e293b; border-radius: 16px;
            border: 1px solid #334155; width: 100%; max-width: 640px;
            max-height: 90vh; overflow-y: auto; padding: 28px;
        }
        .modal h2 { color: #38bdf8; margin-bottom: 20px; font-size: 1.2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-full { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { color: #94a3b8; font-size: 0.82rem; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: #0f172a; border: 1px solid #334155;
            color: #e2e8f0; padding: 9px 12px; border-radius: 8px; font-size: 0.9rem;
        }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-group input:focus,
        .form-group select:focus { outline: none; border-color: #38bdf8; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

        /* 자동 분류 결과 박스 */
        .auto-result {
            display: none; background: #0f172a;
            border: 1px solid #334155; border-radius: 8px;
            padding: 12px 16px; margin-top: 12px; font-size: 0.88rem;
            grid-column: 1 / -1;
        }
        .auto-result.show { display: block; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* 반응형 */
        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: repeat(3, 1fr); padding: 14px 16px; }
            .table-wrap { padding: 12px 16px; }
            .filter-bar { padding: 12px 16px; }
            .tabs { padding: 0 16px; }
        }
        @media (max-width: 480px) {
            .header { padding: 12px 14px; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .form-grid { grid-template-columns: 1fr; }
            .form-full { grid-column: 1; }
            .modal { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
    <h1>🧪 AE Manager</h1>
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <button class="btn btn-green" onclick="openCreateModal()">+ AE 등록</button>
        <a href="/dashboard">← 대시보드로</a>
    </div>
</div>

<!-- 요약 카드 -->
<div class="summary-grid">
    <div class="summary-card">
        <div class="val val-blue" id="s-total">-</div>
        <div class="lbl">전체 AE</div>
    </div>
    <div class="summary-card">
        <div class="val val-red" id="s-sae">-</div>
        <div class="lbl">SAE</div>
    </div>
    <div class="summary-card">
        <div class="val val-orange" id="s-overdue">-</div>
        <div class="lbl">⚠️ 기한 초과</div>
    </div>
    <div class="summary-card">
        <div class="val val-orange" id="s-urgent">-</div>
        <div class="lbl">🔴 3일 이내</div>
    </div>
    <div class="summary-card">
        <div class="val val-green" id="s-submitted">-</div>
        <div class="lbl">✅ 제출 완료</div>
    </div>
</div>

<!-- 탭 -->
<div class="tabs">
    <div class="tab active" onclick="filterByStatus('')" id="tab-all">전체</div>
    <div class="tab" onclick="filterByStatus('overdue')" id="tab-overdue">⚠️ 기한초과</div>
    <div class="tab" onclick="filterByStatus('urgent')" id="tab-urgent">🔴 긴급</div>
    <div class="tab" onclick="filterByStatus('warning')" id="tab-warning">🟡 주의</div>
    <div class="tab" onclick="filterByStatus('normal')" id="tab-normal">✅ 정상</div>
    <div class="tab" onclick="filterByStatus('submitted')" id="tab-submitted">📋 제출완료</div>
</div>

<!-- 필터 바 -->
<div class="filter-bar">
    <select id="filter-sae" onchange="loadList()">
        <option value="">전체 (AE+SAE)</option>
        <option value="true">SAE만</option>
    </select>
    <input type="text" id="filter-search" placeholder="약물명/환자코드 검색..."
           style="flex:1; min-width:160px;" oninput="filterTable()"/>
    <button class="btn btn-gray" onclick="loadList()">새로고침</button>
</div>

<!-- 테이블 -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>환자코드</th>
                <th>약물명</th>
                <th>AE 용어</th>
                <th>Grade</th>
                <th>SAE</th>
                <th>인과관계</th>
                <th>결과</th>
                <th>마감 상태</th>
                <th>마감일</th>
                <th>액션</th>
            </tr>
        </thead>
        <tbody id="ae-tbody">
            <tr><td colspan="11" style="text-align:center; padding:40px; color:#475569;">
                <div class="spinner"></div>불러오는 중...
            </td></tr>
        </tbody>
    </table>
</div>

<!-- ── AE 등록 모달 ── -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <h2>📋 AE 등록</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>환자 코드 *</label>
                <input type="text" id="c-patient" placeholder="예: PT-001"/>
            </div>
            <div class="form-group">
                <label>성별</label>
                <select id="c-sex">
                    <option value="">선택</option>
                    <option value="F">여성 (F)</option>
                    <option value="M">남성 (M)</option>
                </select>
            </div>
            <div class="form-group">
                <label>나이</label>
                <input type="number" id="c-age" placeholder="예: 45"/>
            </div>
            <div class="form-group">
                <label>약물명 *</label>
                <input type="text" id="c-drug" placeholder="예: METHOTREXATE"/>
            </div>
            <div class="form-group">
                <label>용량</label>
                <input type="text" id="c-dose" placeholder="예: 10mg"/>
            </div>
            <div class="form-group">
                <label>투여경로</label>
                <select id="c-route">
                    <option value="">선택</option>
                    <option value="경구">경구</option>
                    <option value="정맥주사">정맥주사</option>
                    <option value="근육주사">근육주사</option>
                    <option value="피하주사">피하주사</option>
                    <option value="외용">외용</option>
                    <option value="흡입">흡입</option>
                </select>
            </div>
            <div class="form-group form-full">
                <label>AE 용어 (MedDRA PT) *</label>
                <input type="text" id="c-ae-term" placeholder="예: NAUSEA, FATIGUE, HOSPITALIZATION"
                       oninput="previewAutoClassify()"/>
            </div>

            <!-- 자동 분류 미리보기 -->
            <div class="auto-result" id="auto-result"></div>

            <div class="form-group">
                <label>CTCAE Grade (자동 판정됨)</label>
                <select id="c-grade">
                    <option value="">자동</option>
                    <option value="1">Grade 1 — 경미</option>
                    <option value="2">Grade 2 — 중등도</option>
                    <option value="3">Grade 3 — 중증</option>
                    <option value="4">Grade 4 — 생명위협</option>
                    <option value="5">Grade 5 — 사망</option>
                </select>
            </div>
            <div class="form-group">
                <label>SAE 여부 (자동 판정됨)</label>
                <select id="c-is-sae">
                    <option value="">자동</option>
                    <option value="true">SAE 해당</option>
                    <option value="false">비해당</option>
                </select>
            </div>
            <div class="form-group">
                <label>SAE 분류</label>
                <select id="c-sae-cat">
                    <option value="">선택</option>
                    <option value="사망">사망</option>
                    <option value="입원">입원 또는 입원 연장</option>
                    <option value="생명위협">생명을 위협하는 상태</option>
                    <option value="영구장애">영구적 장애/기능저하</option>
                    <option value="선천성이상">선천성 이상</option>
                    <option value="기타 중요 의학적 사건">기타 중요 의학적 사건</option>
                </select>
            </div>
            <div class="form-group">
                <label>인과관계</label>
                <select id="c-causality">
                    <option value="">선택</option>
                    <option value="Certain">Certain (확실)</option>
                    <option value="Probable">Probable (가능성 높음)</option>
                    <option value="Possible">Possible (가능)</option>
                    <option value="Unlikely">Unlikely (낮음)</option>
                    <option value="Unclassifiable">Unclassifiable (평가불가)</option>
                </select>
            </div>
            <div class="form-group">
                <label>AE 발생일</label>
                <input type="date" id="c-start-date"/>
            </div>
            <div class="form-group">
                <label>AE 종료일</label>
                <input type="date" id="c-end-date"/>
            </div>
            <div class="form-group">
                <label>처치</label>
                <select id="c-action">
                    <option value="">선택</option>
                    <option value="투여중단">투여중단</option>
                    <option value="용량감량">용량감량</option>
                    <option value="투여유지">투여유지</option>
                    <option value="해당없음">해당없음</option>
                </select>
            </div>
            <div class="form-group">
                <label>결과</label>
                <select id="c-outcome">
                    <option value="">선택</option>
                    <option value="회복">회복</option>
                    <option value="회복중">회복 중</option>
                    <option value="후유증 동반 회복">후유증 동반 회복</option>
                    <option value="미회복">미회복</option>
                    <option value="사망">사망</option>
                    <option value="불명">불명</option>
                </select>
            </div>
            <div class="form-group form-full">
                <label>비고</label>
                <textarea id="c-notes" placeholder="추가 메모..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-gray" onclick="closeModal('create-modal')">취소</button>
            <button class="btn btn-green" onclick="submitCreate()">등록</button>
        </div>
        <div id="create-msg" style="margin-top:10px; font-size:0.88rem; text-align:center;"></div>
    </div>
</div>

<!-- ── AE 상세 모달 ── -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal">
        <h2>📄 AE 상세</h2>
        <div id="detail-content"></div>
        <div class="modal-footer">
            <button class="btn btn-gray" onclick="closeModal('detail-modal')">닫기</button>
            <button class="btn btn-orange" id="detail-submit-btn">✅ 제출 완료 처리</button>
            <button class="btn btn-red" id="detail-delete-btn">🗑 삭제</button>
        </div>
    </div>
</div>

<script>
    let currentStatus = '';
    let allReports = [];

    // ── 초기 로드
    document.addEventListener('DOMContentLoaded', loadList);

    function loadList() {
        const saeOnly = document.getElementById('filter-sae').value === 'true';
        const url = `/api/ae/list?sae_only=${saeOnly}`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            // 요약 업데이트
            const s = data.summary;
            document.getElementById('s-total').textContent = s.total;
            document.getElementById('s-sae').textContent = s.sae_count;
            document.getElementById('s-overdue').textContent = s.overdue;
            document.getElementById('s-urgent').textContent = s.urgent;
            document.getElementById('s-submitted').textContent = s.submitted;

            allReports = data.reports;
            renderTable(allReports);
        });
    }

    function filterByStatus(status) {
        currentStatus = status;
        // 탭 활성화
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const tabMap = {'': 'tab-all', 'overdue': 'tab-overdue', 'urgent': 'tab-urgent',
                        'warning': 'tab-warning', 'normal': 'tab-normal', 'submitted': 'tab-submitted'};
        document.getElementById(tabMap[status])?.classList.add('active');

        const filtered = status ? allReports.filter(r => r.deadline_status === status) : allReports;
        renderTable(filtered);
    }

    function filterTable() {
        const q = document.getElementById('filter-search').value.toLowerCase();
        const filtered = allReports.filter(r =>
            r.drugname.toLowerCase().includes(q) ||
            r.patient_code.toLowerCase().includes(q) ||
            r.ae_term.toLowerCase().includes(q)
        );
        renderTable(filtered);
    }

    function renderTable(reports) {
        const tbody = document.getElementById('ae-tbody');
        if (reports.length === 0) {
            tbody.innerHTML = `<tr><td colspan="11">
                <div class="empty-state"><div class="icon">📭</div>등록된 AE가 없어요</div>
            </td></tr>`;
            return;
        }

        const gradeColors = {1:'badge-g1', 2:'badge-g2', 3:'badge-g3', 4:'badge-g4', 5:'badge-g5'};
        const statusLabels = {
            overdue: ['badge-overdue', '⚠️ 기한초과'],
            urgent:  ['badge-urgent',  '🔴 긴급'],
            warning: ['badge-warning', '🟡 주의'],
            normal:  ['badge-normal',  '✅ 정상'],
            submitted: ['badge-submitted', '📋 제출완료'],
            no_deadline: ['badge-no_deadline', '—'],
        };

        tbody.innerHTML = reports.map(r => {
            const [sCls, sLbl] = statusLabels[r.deadline_status] || ['badge-no_deadline', '—'];
            const gCls = gradeColors[r.ctcae_grade] || 'badge-g1';
            const deadline = r.report_deadline
                ? `${r.report_deadline}${r.days_until_deadline !== null ? ` (${r.days_until_deadline}일)` : ''}`
                : '—';
            return `<tr>
                <td style="color:#64748b;">#${r.id}</td>
                <td><strong>${r.patient_code}</strong></td>
                <td style="color:#38bdf8;">${r.drugname}</td>
                <td>${r.ae_term}</td>
                <td><span class="badge ${gCls}">G${r.ctcae_grade || '?'}</span></td>
                <td><span class="badge ${r.is_sae ? 'badge-sae' : 'badge-ae'}">${r.is_sae ? 'SAE' : 'AE'}</span></td>
                <td style="color:#94a3b8; font-size:0.82rem;">${r.causality || '—'}</td>
                <td style="color:#94a3b8; font-size:0.82rem;">${r.outcome || '—'}</td>
                <td><span class="badge ${sCls}">${sLbl}</span></td>
                <td style="font-size:0.82rem; color:#94a3b8;">${deadline}</td>
                <td>
                    <button class="btn btn-gray btn-sm" onclick="openDetail(${r.id})">상세</button>
                    ${!r.is_submitted ? `<button class="btn btn-green btn-sm" style="margin-left:4px;" onclick="submitAE(${r.id})">제출</button>` : ''}
                </td>
            </tr>`;
        }).join('');
    }

    // ── 자동 분류 미리보기
    function previewAutoClassify() {
        const term = document.getElementById('c-ae-term').value;
        const box = document.getElementById('auto-result');
        if (term.length < 2) { box.classList.remove('show'); return; }

        const termLower = term.toLowerCase();
        const gradeKw = {5:['death','fatal','사망'], 4:['life-threatening','생명위협','icu'], 3:['hospitali','severe','입원','중증'], 2:['moderate','중등도'], 1:['mild','경미']};
        let grade = 1;
        for (const g of [5,4,3,2,1]) {
            if (gradeKw[g].some(kw => termLower.includes(kw))) { grade = g; break; }
        }
        const saeKw = ['사망','입원','생명위협','영구장애','선천성','death','hospitali','life-threatening','disability'];
        const isSae = grade >= 3 || saeKw.some(kw => termLower.includes(kw));
        const gradeLabels = {1:'경미',2:'중등도',3:'중증',4:'생명위협',5:'사망'};
        const gradeColors2 = {1:'#67e8f9',2:'#fde68a',3:'#fdba74',4:'#fca5a5',5:'#f87171'};

        box.innerHTML = `🤖 자동 분류 결과 &nbsp;→&nbsp;
            <strong style="color:${gradeColors2[grade]}">CTCAE Grade ${grade} (${gradeLabels[grade]})</strong>
            &nbsp;|&nbsp;
            <strong style="color:${isSae ? '#fca5a5' : '#86efac'}">${isSae ? '⚠️ SAE 해당' : '✅ 일반 AE'}</strong>
            ${isSae ? '<br><span style="color:#94a3b8; font-size:0.82rem;">📅 등록 시 15일 보고 마감일이 자동 설정돼요</span>' : ''}`;
        box.classList.add('show');
    }

    // ── AE 등록
    function openCreateModal() {
        document.getElementById('create-modal').classList.add('open');
        document.getElementById('create-msg').innerHTML = '';
        document.getElementById('auto-result').classList.remove('show');
    }

    function submitCreate() {
        const data = {
            patient_code: document.getElementById('c-patient').value,
            sex: document.getElementById('c-sex').value,
            age: document.getElementById('c-age').value,
            drugname: document.getElementById('c-drug').value,
            dose: document.getElementById('c-dose').value,
            route: document.getElementById('c-route').value,
            ae_term: document.getElementById('c-ae-term').value,
            ctcae_grade: document.getElementById('c-grade').value || null,
            is_sae: document.getElementById('c-is-sae').value === 'true' ? true
                  : document.getElementById('c-is-sae').value === 'false' ? false : null,
            sae_category: document.getElementById('c-sae-cat').value,
            causality: document.getElementById('c-causality').value,
            ae_start_date: document.getElementById('c-start-date').value,
            ae_end_date: document.getElementById('c-end-date').value,
            action_taken: document.getElementById('c-action').value,
            outcome: document.getElementById('c-outcome').value,
            notes: document.getElementById('c-notes').value,
        };

        if (!data.patient_code || !data.drugname || !data.ae_term) {
            document.getElementById('create-msg').innerHTML =
                '<span style="color:#f87171">환자코드, 약물명, AE 용어는 필수예요</span>'; return;
        }

        document.getElementById('create-msg').innerHTML = '<div class="spinner"></div>등록 중...';

        fetch('/api/ae/create', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            if (result.error) {
                document.getElementById('create-msg').innerHTML = `<span style="color:#f87171">❌ ${result.error}</span>`; return;
            }
            let msg = `✅ AE #${result.id} 등록 완료 | Grade ${result.ctcae_grade} | ${result.is_sae ? '⚠️ SAE' : '일반 AE'}`;
            if (result.report_deadline) msg += ` | 마감: ${result.report_deadline}`;
            document.getElementById('create-msg').innerHTML = `<span style="color:#34d399">${msg}</span>`;
            loadList();
            setTimeout(() => closeModal('create-modal'), 2000);
        });
    }

    // ── 상세 보기
    function openDetail(id) {
        fetch(`/api/ae/${id}`)
        .then(res => res.json())
        .then(r => {
            const gradeLabels = {1:'경미',2:'중등도',3:'중증',4:'생명위협',5:'사망'};
            document.getElementById('detail-content').innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; font-size:0.9rem;">
                    ${row('환자코드', r.patient_code)}
                    ${row('약물명', `<span style="color:#38bdf8">${r.drugname}</span>`)}
                    ${row('나이/성별', `${r.age || '—'}세 / ${r.sex || '—'}`)}
                    ${row('투여경로', r.route || '—')}
                    ${row('AE 용어', `<strong>${r.ae_term}</strong>`)}
                    ${row('CTCAE Grade', `Grade ${r.ctcae_grade} (${gradeLabels[r.ctcae_grade] || '—'})`)}
                    ${row('SAE 여부', r.is_sae ? '<span style="color:#fca5a5">⚠️ SAE</span>' : '일반 AE')}
                    ${row('SAE 분류', r.sae_category || '—')}
                    ${row('인과관계', r.causality || '—')}
                    ${row('처치', r.action_taken || '—')}
                    ${row('결과', r.outcome || '—')}
                    ${row('발생일', r.ae_start_date || '—')}
                    ${row('종료일', r.ae_end_date || '—')}
                    ${row('마감일', r.report_deadline ? `${r.report_deadline} (${r.days_until_deadline}일 남음)` : '—')}
                    ${row('제출 여부', r.is_submitted ? '<span style="color:#34d399">✅ 제출완료</span>' : '미제출')}
                    ${r.notes ? `<div style="grid-column:1/-1;">${row('비고', r.notes)}</div>` : ''}
                </div>`;

            document.getElementById('detail-submit-btn').onclick = () => submitAE(id);
            document.getElementById('detail-delete-btn').onclick = () => deleteAE(id);
            document.getElementById('detail-modal').classList.add('open');
        });
    }

    function row(label, value) {
        return `<div style="background:#0f172a; padding:10px 14px; border-radius:8px;">
            <div style="color:#64748b; font-size:0.78rem; margin-bottom:3px;">${label}</div>
            <div>${value}</div>
        </div>`;
    }

    // ── 제출 완료
    function submitAE(id) {
        if (!confirm(`AE #${id}를 제출 완료 처리할까요?`)) return;
        fetch(`/api/ae/${id}/submit`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            closeModal('detail-modal');
            loadList();
        });
    }

    // ── 삭제
    function deleteAE(id) {
        if (!confirm(`AE #${id}를 삭제할까요? 되돌릴 수 없어요.`)) return;
        fetch(`/api/ae/${id}/delete`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            closeModal('detail-modal');
            loadList();
        });
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }

    // 모달 바깥 클릭 시 닫기
    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });
</script>
</body>
</html>
