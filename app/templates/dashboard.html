<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        .header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #38bdf8; font-size: 1.4rem; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .section { background: #1e293b; padding: 20px 24px; border-bottom: 1px solid #334155; }
        .section h3 { color: #38bdf8; margin-bottom: 14px; font-size: 1rem; }
        .input-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
        .input-row input[type="text"], .input-row input[type="number"], .input-row input[type="file"], .input-row select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; min-width: 0; }
        .input-grow { flex: 1 1 200px; } .input-fixed-sm { width: 90px; flex-shrink: 0; } .input-select { flex: 0 0 100px; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .btn-blue{background:#38bdf8;color:#0f172a;} .btn-cyan{background:#0891b2;color:white;}
        .btn-purple{background:#7c3aed;color:white;} .btn-green{background:#059669;color:white;}
        .btn-gray{background:#334155;color:#e2e8f0;font-size:0.85rem;padding:7px 14px;}
        .btn-yellow{background:#f59e0b;color:white;font-size:0.85rem;padding:7px 14px;}
        .btn-navy{background:#1d4ed8;color:white;font-size:0.85rem;padding:6px 14px;}
        .btn-auth-outline{background:transparent;color:#94a3b8;border:1px solid #334155;padding:6px 14px;border-radius:6px;font-size:0.82rem;text-decoration:none;}
        .btn-auth-fill{background:#38bdf8;color:#0f172a;padding:6px 14px;border-radius:6px;font-size:0.82rem;font-weight:bold;text-decoration:none;}
        .lang-btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:bold;}
        .lang-btn:hover{border-color:#38bdf8;color:#38bdf8;}
        .result { margin-top: 12px; font-size: 0.9rem; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px 24px; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; min-height: 440px; overflow: hidden; }
        .autocomplete-wrap { position: relative; flex: 1 1 200px; min-width: 0; }
        .suggestions { display: none; position: absolute; background: #1e293b; border: 1px solid #334155; border-radius: 8px; width: 100%; z-index: 200; top: calc(100% + 4px); max-height: 220px; overflow-y: auto; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #334155; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .inner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
        @media (max-width: 768px) { .header h1{font-size:1.1rem;} .grid{grid-template-columns:1fr;padding:14px 16px;gap:12px;} .section{padding:16px;} .chart-card{min-height:320px;} .inner-grid{grid-template-columns:1fr;} }
        @media (max-width: 480px) { .header{padding:12px 14px;} .section{padding:14px;} .input-row{flex-direction:column;} .input-row input,.input-row select,.autocomplete-wrap{width:100%!important;flex:none;} .input-fixed-sm,.input-select{width:100%;flex:none;} .btn{width:100%;margin-left:0!important;} .grid{padding:12px;gap:10px;} }
        body.light-mode{background:#f8fafc;color:#1e293b;}
        body.light-mode .header{background:#ffffff;border-bottom:1px solid #e2e8f0;}
        body.light-mode .header h1{color:#1d4ed8;}
        body.light-mode .header a{color:#64748b;}
        body.light-mode .section{background:#ffffff;border-bottom:1px solid #e2e8f0;}
        body.light-mode .section h3{color:#1d4ed8;}
        body.light-mode .input-row input, body.light-mode .input-row select{background:#f1f5f9;border-color:#cbd5e1;color:#1e293b;}
        body.light-mode .chart-card{background:#ffffff;border-color:#e2e8f0;}
        body.light-mode .suggestions{background:#ffffff;border-color:#e2e8f0;}
    </style>
</head>
<body>

<div class="header">
    <h1>💊 Pharma Risk Analyzer</h1>
    <div class="header-right">
        <div id="header-auth" style="display:flex;align-items:center;gap:8px;font-size:0.88rem;"></div>
        <button id="lang-btn" class="lang-btn" onclick="toggleLang()">🇺🇸 EN</button>
        <button onclick="toggleTheme()" id="theme-btn" class="btn btn-gray" data-ko="☀️ 라이트 모드" data-en="☀️ Light Mode">☀️ 라이트 모드</button>
        <a href="/" data-ko="← 홈으로" data-en="← Home">← 홈으로</a>
    </div>
</div>

<div class="section">
    <h3 data-ko="📸 알약 이미지 탐지" data-en="📸 Pill Image Detection">📸 알약 이미지 탐지</h3>
    <div class="input-row">
        <input type="file" id="pill-image" accept="image/*"/>
        <input type="text" id="pill-drug-hint" class="input-grow" data-ko="약물명 힌트 (예: METHOTREXATE)" data-en="Drug hint (e.g. METHOTREXATE)" placeholder="약물명 힌트 (예: METHOTREXATE)"/>
        <button class="btn btn-cyan" onclick="detectPill()" data-ko="탐지" data-en="Detect">탐지</button>
    </div>
    <div class="result" id="detect-result"></div>
    <div id="detect-image" style="margin-top:12px;"></div>
</div>

<div class="section">
    <h3 data-ko="🔍 약물 검색" data-en="🔍 Drug Search">🔍 약물 검색</h3>
    <div class="input-row">
        <div class="autocomplete-wrap">
            <input type="text" id="drug-input" data-ko="약물명 입력 (예: METHOTREXATE)" data-en="Enter drug name (e.g. METHOTREXATE)" placeholder="약물명 입력 (예: METHOTREXATE)" style="width:100%;" oninput="showSuggestions(this.value,'drug-suggestions','drug-input')"/>
            <div id="drug-suggestions" class="suggestions"></div>
        </div>
        <button class="btn btn-blue" onclick="searchDrug()" data-ko="검색" data-en="Search">검색</button>
    </div>
    <div class="result" id="search-result"></div>
    <div id="search-chart" style="margin-top:16px;"></div>
</div>

<div class="grid">
    <div class="chart-card" id="chart1"></div>
    <div class="chart-card" id="chart2"></div>
    <div class="chart-card" id="chart3"></div>
    <div class="chart-card" id="chart4"></div>
    <div class="chart-card" id="chart5"></div>
    <div class="chart-card" id="chart6"></div>
</div>

<div class="section">
    <h3 data-ko="🤖 AI 위험도 예측" data-en="🤖 AI Risk Prediction">🤖 AI 위험도 예측</h3>
    <div class="input-row">
        <div class="autocomplete-wrap">
            <input type="text" id="pred-drug" data-ko="약물명 (예: METHOTREXATE)" data-en="Drug name (e.g. METHOTREXATE)" placeholder="약물명 (예: METHOTREXATE)" style="width:100%;" oninput="showSuggestions(this.value,'pred-drug-suggestions','pred-drug')"/>
            <div id="pred-drug-suggestions" class="suggestions"></div>
        </div>
        <input type="text" id="pred-reac" class="input-grow" data-ko="부작용 (예: FATIGUE)" data-en="Reaction (e.g. FATIGUE)" placeholder="부작용 (예: FATIGUE)"/>
        <input type="number" id="pred-age" class="input-fixed-sm" data-ko="나이" data-en="Age" placeholder="나이" value="50"/>
        <select id="pred-sex" class="input-select">
            <option value="F" data-ko="여성" data-en="Female">여성</option>
            <option value="M" data-ko="남성" data-en="Male">남성</option>
        </select>
        <button class="btn btn-purple" onclick="predictRisk()" data-ko="예측" data-en="Predict">예측</button>
    </div>
    <div class="result" id="predict-result"></div>
</div>

<div class="section">
    <h3 data-ko="💊 약물 조합 위험도 분석" data-en="💊 Drug Combination Risk">💊 약물 조합 위험도 분석</h3>
    <div class="input-row">
        <input type="text" id="combo-drug1" class="input-grow" data-ko="약물 1 (예: METHOTREXATE)" data-en="Drug 1 (e.g. METHOTREXATE)" placeholder="약물 1 (예: METHOTREXATE)"/>
        <input type="text" id="combo-drug2" class="input-grow" data-ko="약물 2 (예: PREDNISONE)" data-en="Drug 2 (e.g. PREDNISONE)" placeholder="약물 2 (예: PREDNISONE)"/>
        <input type="number" id="combo-age" class="input-fixed-sm" placeholder="50" value="50"/>
        <select id="combo-sex" class="input-select">
            <option value="F" data-ko="여성" data-en="Female">여성</option>
            <option value="M" data-ko="남성" data-en="Male">남성</option>
        </select>
        <button class="btn btn-green" onclick="analyzeCombo()" data-ko="분석" data-en="Analyze">분석</button>
    </div>
    <div class="result" id="combo-result"></div>
</div>

<div class="section">
    <h3>
        <span data-ko="📋 검색 &amp; 예측 기록" data-en="📋 Search &amp; Prediction History">📋 검색 &amp; 예측 기록</span>
        <button onclick="loadHistory()" class="btn btn-gray" style="margin-left:12px;" data-ko="새로고침" data-en="Refresh">새로고침</button>
        <button onclick="loadFavorites()" class="btn btn-yellow" style="margin-left:8px;" data-ko="⭐ 즐겨찾기" data-en="⭐ Favorites">⭐ 즐겨찾기</button>
    </h3>
    <div id="favorites-content" style="margin-bottom:12px;"></div>
    <div id="history-content"></div>
</div>

<script src="/static/lang.js"></script>
<script>
    // 로그인 상태
    fetch('/api/me').then(res => res.json()).then(data => {
        const el = document.getElementById('header-auth');
        const lang = getLang();
        if (data.logged_in) {
            el.innerHTML = `<span style="color:#94a3b8;">👤 <strong style="color:#38bdf8;">${data.username}</strong>${lang === 'ko' ? '님' : ''}</span>
                <button onclick="logout()" class="btn btn-gray" style="padding:6px 12px;" data-ko="로그아웃" data-en="Logout">로그아웃</button>`;
        } else {
            el.innerHTML = `<a href="/login" class="btn-auth-outline" data-ko="로그인" data-en="Login">로그인</a>
                <a href="/register" class="btn-auth-fill" data-ko="회원가입" data-en="Sign Up">회원가입</a>`;
        }
        applyLang(lang);
    }).catch(() => {
        const lang = getLang();
        document.getElementById('header-auth').innerHTML = `<a href="/login" class="btn-auth-outline" data-ko="로그인" data-en="Login">로그인</a><a href="/register" class="btn-auth-fill" data-ko="회원가입" data-en="Sign Up">회원가입</a>`;
        applyLang(lang);
    });

    function logout() { fetch('/logout').then(() => window.location.href = '/'); }

    // 테마
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const btn = document.getElementById('theme-btn');
        const isLight = document.body.classList.contains('light-mode');
        const lang = getLang();
        btn.setAttribute('data-ko', isLight ? '🌙 다크 모드' : '☀️ 라이트 모드');
        btn.setAttribute('data-en', isLight ? '🌙 Dark Mode' : '☀️ Light Mode');
        applyLang(lang);
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    // 차트
    Plotly.newPlot('chart1', JSON.parse('{{ charts.chart1 | safe }}'));
    Plotly.newPlot('chart2', JSON.parse('{{ charts.chart2 | safe }}'));
    Plotly.newPlot('chart3', JSON.parse('{{ charts.chart3 | safe }}'));
    Plotly.newPlot('chart4', JSON.parse('{{ charts.chart4 | safe }}'));
    Plotly.newPlot('chart5', JSON.parse('{{ charts.chart5 | safe }}'));
    Plotly.newPlot('chart6', JSON.parse('{{ charts.chart6 | safe }}'));

    function detectPill() {
        const fileInput = document.getElementById('pill-image');
        const drugHint = document.getElementById('pill-drug-hint').value;
        const lang = getLang();
        if (!fileInput.files[0]) { alert(lang === 'ko' ? '이미지를 선택해주세요!' : 'Please select an image!'); return; }
        document.getElementById('detect-result').innerHTML = `<span><div class="spinner"></div>${lang === 'ko' ? '탐지 중...' : 'Detecting...'}</span>`;
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('drugname', drugHint);
        fetch('/api/detect', { method: 'POST', body: formData }).then(res => res.json()).then(data => {
            if (data.error) { document.getElementById('detect-result').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
            let html = '';
            if (data.detections.length === 0) {
                html += `<span style="color:#f87171">❌ ${lang === 'ko' ? '알약을 찾을 수 없어요' : 'No pills detected'}</span>`;
            } else {
                html += `✅ ${lang === 'ko' ? '알약' : 'Pill'} <strong style="color:#38bdf8">${data.detections.length}</strong>${lang === 'ko' ? '개 탐지' : ' detected'} (${lang === 'ko' ? '최고 신뢰도' : 'Confidence'}: <strong>${data.detections[0].confidence}%</strong>)<br>`;
            }
            if (data.risk_result) {
                const r = data.risk_result;
                const color = r.risk_label.includes('위험') && !r.risk_label.includes('비') ? '#f87171' : '#34d399';
                html += `<br>🤖 <strong style="color:#38bdf8">${r.drug}</strong> → <strong style="color:${color}">${r.risk_label}</strong> | ${lang === 'ko' ? '안전' : 'Safe'} ${r.safe}% / ${lang === 'ko' ? '위험' : 'Risk'} ${r.risk}%`;
            }
            document.getElementById('detect-result').innerHTML = html;
            document.getElementById('detect-image').innerHTML = `<img src="data:image/jpeg;base64,${data.image}" style="max-width:100%;border-radius:8px;margin-top:8px;"/>`;
        });
    }

    function searchDrug() {
        const drug = document.getElementById('drug-input').value;
        const lang = getLang();
        if (!drug) return;
        document.getElementById('search-result').innerHTML = `<span><div class="spinner"></div>${lang === 'ko' ? '검색 중...' : 'Searching...'}</span>`;
        fetch(`/api/search/${drug}`).then(res => res.json()).then(data => {
            if (data.error) { document.getElementById('search-result').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
            const totalLabel = lang === 'ko' ? '총' : 'Total';
            const reportsLabel = lang === 'ko' ? '건' : 'reports';
            const ageLabel = lang === 'ko' ? '평균 나이' : 'Avg Age';
            const detailLabel = lang === 'ko' ? '📊 상세 분석 →' : '📊 Details →';
            const favLabel = lang === 'ko' ? '⭐ 즐겨찾기' : '⭐ Favorite';
            document.getElementById('search-result').innerHTML = `
                <strong style="color:#38bdf8">${data.drug}</strong> — ${totalLabel} <strong>${data.total_reports.toLocaleString()}</strong>${reportsLabel} | ${ageLabel}: <strong>${data.age_avg}${lang === 'ko' ? '세' : 'y'}</strong>
                &nbsp;<a href="/drug/${data.drug}" style="color:#a78bfa;text-decoration:none;">${detailLabel}</a>
                <button onclick="addFavorite('${data.drug}')" class="btn btn-yellow" style="margin-left:8px;">${favLabel}</button>`;
            const chartTitle = lang === 'ko' ? `${data.drug} - Top 10 부작용` : `${data.drug} - Top 10 Adverse Reactions`;
            Plotly.newPlot('search-chart', [{ type: 'bar', x: data.top_reactions.map(r => r.reaction), y: data.top_reactions.map(r => r.count), marker: { color: '#38bdf8' } }],
                { title: chartTitle, paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b', font: { color: '#e2e8f0' }, height: 350, margin: { t: 50, b: 120 }, xaxis: { tickangle: -45 } });
        });
    }

    function predictRisk() {
        const drug = document.getElementById('pred-drug').value;
        const reac = document.getElementById('pred-reac').value;
        const age  = document.getElementById('pred-age').value;
        const sex  = document.getElementById('pred-sex').value;
        const lang = getLang();
        if (!drug || !reac) { alert(lang === 'ko' ? '약물명과 부작용을 입력하세요!' : 'Please enter drug and reaction!'); return; }
        document.getElementById('predict-result').innerHTML = `<span><div class="spinner"></div>${lang === 'ko' ? '예측 중...' : 'Predicting...'}</span>`;
        fetch('/api/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({drugname: drug, reaction: reac, age, sex}) })
        .then(res => res.json()).then(data => {
            if (data.error) { document.getElementById('predict-result').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
            const safeLabel = lang === 'ko' ? '안전' : 'Safe';
            const riskLabel2 = lang === 'ko' ? '위험' : 'Risk';
            const explainLabel = lang === 'ko' ? '🤖 AI 설명' : '🤖 AI Explain';
            document.getElementById('predict-result').innerHTML = `
                <strong style="color:#38bdf8">${data.drug}</strong> + <strong style="color:#a78bfa">${data.reaction}</strong> →
                <strong style="color:${data.risk === 1 ? '#f87171':'#34d399'}">${data.risk_label}</strong>
                &nbsp;| ${safeLabel} ${data.probability.safe}% / ${riskLabel2} ${data.probability.risk}%
                <button onclick="explainRisk('${data.drug}','${data.reaction}','${data.risk_label}',${data.probability.safe},${data.probability.risk})" class="btn btn-navy" style="margin-left:12px;">${explainLabel}</button>
                <div id="llm-result" style="margin-top:12px;color:#94a3b8;font-size:0.9rem;line-height:1.6;"></div>`;
        });
    }

    function explainRisk(drug, reaction, riskLabel, safeProb, riskProb) {
        const lang = getLang();
        document.getElementById('llm-result').innerHTML = `<span><div class="spinner"></div>${lang === 'ko' ? 'AI 분석 중...' : 'AI analyzing...'}</span>`;
        fetch('/api/llm_explain', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ drug, reaction, risk_label: riskLabel, safe_prob: safeProb, risk_prob: riskProb }) })
        .then(res => res.json()).then(data => {
            if (data.error) { document.getElementById('llm-result').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
            const title = lang === 'ko' ? 'AI 의학 설명' : 'AI Medical Explanation';
            document.getElementById('llm-result').innerHTML = `<div style="background:#0f172a;padding:16px;border-radius:8px;border-left:3px solid #1d4ed8;margin-top:8px;">🤖 <strong style="color:#38bdf8">${title}:</strong><br><br>${data.explanation}</div>`;
        });
    }

    function analyzeCombo() {
        const drug1 = document.getElementById('combo-drug1').value;
        const drug2 = document.getElementById('combo-drug2').value;
        const age   = document.getElementById('combo-age').value;
        const sex   = document.getElementById('combo-sex').value;
        const lang = getLang();
        if (!drug1 || !drug2) { alert(lang === 'ko' ? '약물 2개를 입력하세요!' : 'Please enter 2 drugs!'); return; }
        document.getElementById('combo-result').innerHTML = `<span><div class="spinner"></div>${lang === 'ko' ? '분석 중...' : 'Analyzing...'}</span>`;
        fetch('/api/combo', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({drug1, drug2, age, sex}) })
        .then(res => res.json()).then(data => {
            if (data.error) { document.getElementById('combo-result').innerHTML = `<span style="color:#f87171">❌ ${data.error}</span>`; return; }
            const riskRateLabel = lang === 'ko' ? '전체 위험률' : 'Overall Risk Rate';
            let html = '<div class="inner-grid">';
            data.results.forEach(r => {
                html += `<div style="background:#0f172a;padding:16px;border-radius:8px;border:1px solid #334155;">
                    <h4 style="color:#38bdf8;margin-bottom:8px;">💊 ${r.drug}</h4>
                    <p style="color:#94a3b8;margin-bottom:8px;font-size:0.85rem;">${riskRateLabel}: <strong style="color:#f87171">${r.drug_risk_rate}%</strong></p>
                    <table style="width:100%;font-size:0.82rem;border-collapse:collapse;">
                        <tr style="color:#64748b;"><th style="text-align:left;padding:4px 0;">${lang === 'ko' ? '부작용' : 'Reaction'}</th><th>${lang === 'ko' ? '위험도' : 'Risk'}</th><th>${lang === 'ko' ? '확률' : 'Prob'}</th></tr>`;
                r.reactions.forEach(rx => {
                    const c = rx.risk === 1 ? '#f87171':'#34d399';
                    html += `<tr><td style="padding:4px 0;">${rx.reaction}</td><td style="color:${c};text-align:center;">${rx.risk_label}</td><td style="text-align:center;">${rx.risk_prob}%</td></tr>`;
                });
                html += `</table></div>`;
            });
            html += '</div>';
            document.getElementById('combo-result').innerHTML = html;
        });
    }

    function addFavorite(drug) { fetch(`/api/favorite/${drug}`, { method: 'POST' }).then(res => res.json()).then(data => alert(data.message)); }

    function loadFavorites() {
        const lang = getLang();
        fetch('/api/favorites').then(res => res.json()).then(data => {
            if (data.favorites.length === 0) { document.getElementById('favorites-content').innerHTML = `<span style="color:#94a3b8">${lang === 'ko' ? '즐겨찾기가 없어요' : 'No favorites yet'}</span>`; return; }
            let html = '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
            data.favorites.forEach(f => { html += `<a href="/drug/${f.drugname}" style="background:#0f172a;color:#38bdf8;padding:8px 16px;border-radius:8px;text-decoration:none;border:1px solid #334155;font-size:0.9rem;">⭐ ${f.drugname}</a>`; });
            html += '</div>';
            document.getElementById('favorites-content').innerHTML = html;
        });
    }

    function loadHistory() {
        const lang = getLang();
        fetch('/api/history').then(res => res.json()).then(data => {
            const searchTitle = lang === 'ko' ? '🔍 최근 검색' : '🔍 Recent Searches';
            const predTitle = lang === 'ko' ? '🤖 최근 예측' : '🤖 Recent Predictions';
            const noData = lang === 'ko' ? '기록이 없어요' : 'No records yet';
            let html = '<div class="inner-grid">';
            html += `<div><h4 style="color:#38bdf8;margin-bottom:8px;">${searchTitle}</h4>`;
            if (data.searches.length === 0) { html += `<span style="color:#94a3b8;font-size:0.85rem;">${noData}</span>`; }
            else { data.searches.forEach(s => { html += `<div style="background:#0f172a;padding:8px 12px;border-radius:6px;margin-bottom:6px;font-size:0.85rem;"><strong style="color:#38bdf8">${s.drugname}</strong> — ${s.total_reports?.toLocaleString()}${lang === 'ko' ? '건' : ''}<span style="color:#64748b;float:right;font-size:0.8rem;">${s.searched_at}</span></div>`; }); }
            html += '</div>';
            html += `<div><h4 style="color:#38bdf8;margin-bottom:8px;">${predTitle}</h4>`;
            if (data.predictions.length === 0) { html += `<span style="color:#94a3b8;font-size:0.85rem;">${noData}</span>`; }
            else { data.predictions.forEach(p => { const c = p.risk === 1 ? '#f87171':'#34d399'; html += `<div style="background:#0f172a;padding:8px 12px;border-radius:6px;margin-bottom:6px;font-size:0.85rem;"><strong style="color:#38bdf8">${p.drugname}</strong> + ${p.reaction} → <strong style="color:${c}">${p.risk === 1 ? '⚠️' : '✅'}</strong><span style="color:#64748b;float:right;font-size:0.8rem;">${p.predicted_at}</span></div>`; }); }
            html += '</div></div>';
            document.getElementById('history-content').innerHTML = html;
        });
    }

    function showSuggestions(value, listId, inputId) {
        const list = document.getElementById(listId);
        if (value.length < 2) { list.style.display = 'none'; return; }
        fetch(`/api/autocomplete/${value}`).then(res => res.json()).then(data => {
            if (data.suggestions.length === 0) { list.style.display = 'none'; return; }
            list.innerHTML = data.suggestions.map(s => `<div onclick="selectSuggestion('${s}','${inputId}','${listId}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #334155;color:#e2e8f0;font-size:0.9rem;" onmouseover="this.style.background='#334155'" onmouseout="this.style.background=''">${s}</div>`).join('');
            list.style.display = 'block';
        });
    }
    function selectSuggestion(value, inputId, listId) { document.getElementById(inputId).value = value; document.getElementById(listId).style.display = 'none'; }
    document.addEventListener('click', () => { ['drug-suggestions','pred-drug-suggestions'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; }); });
</script>
</body>
</html>
