<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        .header {
            background: #1e293b;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }
        .header h1 { color: #38bdf8; font-size: 1.5rem; }
        .header a { color: #94a3b8; text-decoration: none; }
        .section {
            background: #1e293b;
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
        }
        .section h3 { color: #38bdf8; margin-bottom: 12px; }
        .section input[type="text"],
        .section input[type="number"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-blue { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 8px; }
        .btn-cyan { background: #0891b2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 8px; }
        .btn-purple { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 8px; }
        .result { margin-top: 12px; font-size: 0.95rem; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px 40px;
        }
        .chart-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #334155;
            min-height: 450px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #334155;
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 반응형 */
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .header h1 { font-size: 1.1rem; }
            .section { padding: 15px 20px; }
            .section input[type="text"],
            .section input[type="number"] { width: 100% !important; margin: 4px 0 !important; }
            .section select { width: 100%; margin: 4px 0 !important; }
            .btn-blue, .btn-cyan, .btn-purple { width: 100%; margin: 4px 0 !important; display: block; }
            .grid { grid-template-columns: 1fr !important; padding: 15px 20px; }
            .chart-card { min-height: 300px; }
        }
        @media (max-width: 480px) {
            .header h1 { font-size: 1rem; }
        }

        /* 라이트 모드 */
        body.light-mode { background: #f8fafc; color: #1e293b; }
        body.light-mode .header { background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        body.light-mode .header h1 { color: #1d4ed8; }
        body.light-mode .header a { color: #64748b; }
        body.light-mode .section { background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        body.light-mode .section h3 { color: #1d4ed8; }
        body.light-mode .section input[type="text"],
        body.light-mode .section input[type="number"] { background: #f1f5f9; border-color: #cbd5e1; color: #1e293b; }
        body.light-mode .section select { background: #f1f5f9; border-color: #cbd5e1; color: #1e293b; }
        body.light-mode .chart-card { background: #ffffff; border-color: #e2e8f0; }
        body.light-mode .result { color: #374151; }
        body.light-mode .spinner { border-color: #e2e8f0; border-top-color: #1d4ed8; }
    </style>
</head>
<body>

<div class="header">
    <h1>💊 Pharma Risk Analyzer</h1>
    <div style="display:flex; align-items:center; gap:12px;">
        <button onclick="toggleTheme()" id="theme-btn"
                style="background:#334155; color:#e2e8f0; border:none; padding:8px 16px;
                       border-radius:8px; cursor:pointer; font-size:0.85rem;">
            ☀️ 라이트 모드
        </button>
        <a href="/">← 홈으로</a>
    </div>
</div>

<!-- 📸 알약 이미지 탐지 -->
<div class="section">
    <h3>📸 알약 이미지 탐지</h3>
    <input type="file" id="pill-image" accept="image/*"
           style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:10px; border-radius:8px;"/>
    <input type="text" id="pill-drug-hint" placeholder="약물명 힌트 (예: METHOTREXATE)" style="width:280px; margin-left:8px;"/>
    <button class="btn-cyan" onclick="detectPill()">탐지</button>
    <div class="result" id="detect-result"></div>
    <div id="detect-image" style="margin-top:12px;"></div>
</div>

<!-- 🔍 약물 검색 -->
<div class="section">
    <h3>🔍 약물 검색</h3>
    <div style="position:relative; display:inline-block;">
        <input type="text" id="drug-input" placeholder="약물명 입력 (예: METHOTREXATE)"
               style="width:300px;" oninput="showSuggestions(this.value, 'drug-suggestions', 'drug-input')"/>
        <div id="drug-suggestions" style="display:none; position:absolute; background:#1e293b;
             border:1px solid #334155; border-radius:8px; width:300px; z-index:100; top:45px;"></div>
    </div>
    <button class="btn-blue" onclick="searchDrug()">검색</button>
    <div class="result" id="search-result"></div>
    <div id="search-chart" style="margin-top:16px;"></div>
</div>

<!-- 차트 그리드 -->
<div class="grid">
    <div class="chart-card" id="chart1"></div>
    <div class="chart-card" id="chart2"></div>
    <div class="chart-card" id="chart3"></div>
    <div class="chart-card" id="chart4"></div>
    <div class="chart-card" id="chart5"></div>
    <div class="chart-card" id="chart6"></div>
</div>

<!-- 🤖 AI 위험도 예측 -->
<div class="section">
    <h3>🤖 AI 위험도 예측</h3>
    <div style="position:relative; display:inline-block;">
        <input type="text" id="pred-drug" placeholder="약물명 (예: METHOTREXATE)" style="width:220px;"
               oninput="showSuggestions(this.value, 'pred-drug-suggestions', 'pred-drug')"/>
        <div id="pred-drug-suggestions" style="display:none; position:absolute; background:#1e293b;
             border:1px solid #334155; border-radius:8px; width:220px; z-index:100; top:45px;"></div>
    </div>
    <input type="text" id="pred-reac" placeholder="부작용 (예: FATIGUE)" style="width:200px; margin-left:8px;"/>
    <input type="number" id="pred-age" placeholder="나이" value="50" style="width:80px; margin-left:8px;"/>
    <select id="pred-sex" style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:10px; border-radius:8px; margin-left:8px;">
        <option value="F">여성</option>
        <option value="M">남성</option>
    </select>
    <button class="btn-purple" onclick="predictRisk()">예측</button>
    <div class="result" id="predict-result"></div>
</div>

<!-- 💊 약물 조합 위험도 분석 -->
<div class="section">
    <h3>💊 약물 조합 위험도 분석</h3>
    <input type="text" id="combo-drug1" placeholder="약물 1 (예: METHOTREXATE)" style="width:250px;"/>
    <input type="text" id="combo-drug2" placeholder="약물 2 (예: PREDNISONE)" style="width:250px; margin-left:8px;"/>
    <input type="number" id="combo-age" placeholder="나이" value="50" style="width:80px; margin-left:8px;"/>
    <select id="combo-sex" style="background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:10px; border-radius:8px; margin-left:8px;">
        <option value="F">여성</option>
        <option value="M">남성</option>
    </select>
    <button onclick="analyzeCombo()" style="background:#059669; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:8px;">분석</button>
    <div class="result" id="combo-result"></div>
</div>

<!-- 📋 검색 & 예측 기록 -->
<div class="section">
    <h3>📋 검색 &amp; 예측 기록
        <button onclick="loadHistory()"
                style="background:#334155; color:#e2e8f0; border:none; padding:6px 14px;
                       border-radius:6px; cursor:pointer; font-size:0.85rem; margin-left:12px;">
            새로고침
        </button>
        <button onclick="loadFavorites()"
                style="background:#f59e0b; color:white; border:none; padding:6px 14px;
                       border-radius:6px; cursor:pointer; font-size:0.85rem; margin-left:8px;">
            ⭐ 즐겨찾기 보기
        </button>
    </h3>
    <div id="favorites-content" style="margin-bottom:12px;"></div>
    <div id="history-content"></div>
</div>

<script>
    // 🌙 다크/라이트 모드
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const btn = document.getElementById('theme-btn');
        if (document.body.classList.contains('light-mode')) {
            btn.textContent = '🌙 다크 모드';
            localStorage.setItem('theme', 'light');
        } else {
            btn.textContent = '☀️ 라이트 모드';
            localStorage.setItem('theme', 'dark');
        }
    }
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('theme-btn').textContent = '🌙 다크 모드';
        });
    }

    // 차트 렌더링
    Plotly.newPlot('chart1', JSON.parse('{{ charts.chart1 | safe }}'));
    Plotly.newPlot('chart2', JSON.parse('{{ charts.chart2 | safe }}'));
    Plotly.newPlot('chart3', JSON.parse('{{ charts.chart3 | safe }}'));
    Plotly.newPlot('chart4', JSON.parse('{{ charts.chart4 | safe }}'));
    Plotly.newPlot('chart5', JSON.parse('{{ charts.chart5 | safe }}'));
    Plotly.newPlot('chart6', JSON.parse('{{ charts.chart6 | safe }}'));

    // 📸 알약 탐지
    function detectPill() {
        const fileInput = document.getElementById('pill-image');
        const drugHint = document.getElementById('pill-drug-hint').value;
        if (!fileInput.files[0]) { alert('이미지를 선택해주세요!'); return; }
        document.getElementById('detect-result').innerHTML =
            '<span><div class="spinner"></div>탐지 중...</span>';
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('drugname', drugHint);
        fetch('/api/detect', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('detect-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`; return;
            }
            let html = '';
            if (data.detections.length === 0) {
                html += '<span style="color:#f87171">❌ 알약을 찾을 수 없어요</span>';
            } else {
                html += `✅ 알약 <strong style="color:#38bdf8">${data.detections.length}개</strong> 탐지
                         (최고 신뢰도: <strong>${data.detections[0].confidence}%</strong>)<br>`;
            }
            if (data.risk_result) {
                const r = data.risk_result;
                const color = r.risk_label.includes('위험') && !r.risk_label.includes('비') ? '#f87171' : '#34d399';
                html += `<br>🤖 <strong style="color:#38bdf8">${r.drug}</strong> 위험도 →
                         <strong style="color:${color}">${r.risk_label}</strong>
                         | 안전 ${r.safe}% / 위험 ${r.risk}%`;
            }
            document.getElementById('detect-result').innerHTML = html;
            document.getElementById('detect-image').innerHTML =
                `<img src="data:image/jpeg;base64,${data.image}"
                      style="max-width:500px; border-radius:8px; margin-top:8px;"/>`;
        });
    }

    // 🔍 약물 검색
    function searchDrug() {
        const drug = document.getElementById('drug-input').value;
        if (!drug) return;
        document.getElementById('search-result').innerHTML =
            '<span><div class="spinner"></div>검색 중...</span>';
        fetch(`/api/search/${drug}`)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('search-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`; return;
            }
            document.getElementById('search-result').innerHTML = `
                <strong style="color:#38bdf8">${data.drug}</strong> —
                총 <strong>${data.total_reports.toLocaleString()}</strong>건 |
                평균 나이: <strong>${data.age_avg}세</strong>
                &nbsp;|&nbsp;
                <a href="/drug/${data.drug}" style="color:#a78bfa; text-decoration:none;">
                    📊 상세 분석 보기 →
                </a>
                &nbsp;
                <button onclick="addFavorite('${data.drug}')"
                        style="background:#f59e0b; color:white; border:none; padding:4px 12px;
                               border-radius:6px; cursor:pointer; font-size:0.85rem; margin-left:8px;">
                    ⭐ 즐겨찾기
                </button>`;
            Plotly.newPlot('search-chart', [{
                type: 'bar',
                x: data.top_reactions.map(r => r.reaction),
                y: data.top_reactions.map(r => r.count),
                marker: { color: '#38bdf8' }
            }], {
                title: `${data.drug} - Top 10 부작용`,
                paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b',
                font: { color: '#e2e8f0' }, height: 350,
                margin: { t: 50, b: 120 }, xaxis: { tickangle: -45 }
            });
        });
    }

    // 🤖 AI 위험도 예측
    function predictRisk() {
        const drug = document.getElementById('pred-drug').value;
        const reac = document.getElementById('pred-reac').value;
        const age = document.getElementById('pred-age').value;
        const sex = document.getElementById('pred-sex').value;
        if (!drug || !reac) { alert('약물명과 부작용을 입력하세요!'); return; }
        document.getElementById('predict-result').innerHTML =
            '<span><div class="spinner"></div>예측 중...</span>';
        fetch('/api/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({drugname: drug, reaction: reac, age: age, sex: sex})
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('predict-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`; return;
            }
            document.getElementById('predict-result').innerHTML = `
                <strong style="color:#38bdf8">${data.drug}</strong> +
                <strong style="color:#a78bfa">${data.reaction}</strong> →
                <strong style="color:${data.risk === 1 ? '#f87171' : '#34d399'}">${data.risk_label}</strong>
                &nbsp;|&nbsp; 안전 ${data.probability.safe}% / 위험 ${data.probability.risk}%
                <button onclick="explainRisk('${data.drug}','${data.reaction}','${data.risk_label}',${data.probability.safe},${data.probability.risk})"
                        style="background:#1d4ed8; color:white; border:none; padding:6px 14px;
                               border-radius:6px; cursor:pointer; margin-left:12px; font-size:0.85rem;">
                    🤖 AI 설명
                </button>
                <div id="llm-result" style="margin-top:12px; color:#94a3b8; font-size:0.9rem; line-height:1.6;"></div>`;
        });
    }

    // 🤖 LLM 설명
    function explainRisk(drug, reaction, riskLabel, safeProb, riskProb) {
        document.getElementById('llm-result').innerHTML =
            '<span><div class="spinner"></div>AI 분석 중... (10~30초 소요)</span>';
        fetch('/api/llm_explain', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ drug, reaction, risk_label: riskLabel, safe_prob: safeProb, risk_prob: riskProb })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('llm-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`; return;
            }
            document.getElementById('llm-result').innerHTML =
                `<div style="background:#0f172a; padding:16px; border-radius:8px;
                             border-left:3px solid #1d4ed8; margin-top:8px;">
                    🤖 <strong style="color:#38bdf8">AI 의학 설명:</strong><br><br>
                    ${data.explanation}
                </div>`;
        });
    }

    // 💊 약물 조합 분석
    function analyzeCombo() {
        const drug1 = document.getElementById('combo-drug1').value;
        const drug2 = document.getElementById('combo-drug2').value;
        const age = document.getElementById('combo-age').value;
        const sex = document.getElementById('combo-sex').value;
        if (!drug1 || !drug2) { alert('약물 2개를 입력하세요!'); return; }
        document.getElementById('combo-result').innerHTML =
            '<span><div class="spinner"></div>분석 중...</span>';
        fetch('/api/combo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({drug1, drug2, age, sex})
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('combo-result').innerHTML =
                    `<span style="color:#f87171">❌ ${data.error}</span>`; return;
            }
            let html = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:12px;">';
            data.results.forEach(r => {
                html += `<div style="background:#0f172a; padding:16px; border-radius:8px; border:1px solid #334155;">
                    <h4 style="color:#38bdf8; margin-bottom:8px;">💊 ${r.drug}</h4>
                    <p style="color:#94a3b8; margin-bottom:8px;">전체 위험률: <strong style="color:#f87171">${r.drug_risk_rate}%</strong></p>
                    <table style="width:100%; font-size:0.85rem;">
                        <tr style="color:#64748b;"><th style="text-align:left;">부작용</th><th>위험도</th><th>확률</th></tr>`;
                r.reactions.forEach(rx => {
                    const color = rx.risk === 1 ? '#f87171' : '#34d399';
                    html += `<tr>
                        <td style="padding:4px 0;">${rx.reaction}</td>
                        <td style="color:${color}; text-align:center;">${rx.risk_label}</td>
                        <td style="text-align:center;">${rx.risk_prob}%</td>
                    </tr>`;
                });
                html += `</table></div>`;
            });
            html += '</div>';
            document.getElementById('combo-result').innerHTML = html;
        });
    }

    // ⭐ 즐겨찾기
    function addFavorite(drug) {
        fetch(`/api/favorite/${drug}`, { method: 'POST' })
        .then(res => res.json())
        .then(data => alert(data.message));
    }

    function loadFavorites() {
        fetch('/api/favorites')
        .then(res => res.json())
        .then(data => {
            if (data.favorites.length === 0) {
                document.getElementById('favorites-content').innerHTML =
                    '<span style="color:#94a3b8">즐겨찾기가 없어요</span>'; return;
            }
            let html = '<div style="display:flex; flex-wrap:wrap; gap:8px;">';
            data.favorites.forEach(f => {
                html += `<a href="/drug/${f.drugname}"
                            style="background:#0f172a; color:#38bdf8; padding:8px 16px;
                                   border-radius:8px; text-decoration:none; border:1px solid #334155; font-size:0.9rem;">
                            ⭐ ${f.drugname}</a>`;
            });
            html += '</div>';
            document.getElementById('favorites-content').innerHTML = html;
        });
    }

    // 📋 기록
    function loadHistory() {
        fetch('/api/history')
        .then(res => res.json())
        .then(data => {
            let html = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">';
            html += `<div><h4 style="color:#38bdf8; margin-bottom:8px;">🔍 최근 검색 기록</h4>`;
            if (data.searches.length === 0) {
                html += '<span style="color:#94a3b8; font-size:0.85rem;">기록이 없어요</span>';
            } else {
                data.searches.forEach(s => {
                    html += `<div style="background:#0f172a; padding:8px 12px; border-radius:6px; margin-bottom:6px; font-size:0.85rem;">
                        <strong style="color:#38bdf8">${s.drugname}</strong> — ${s.total_reports?.toLocaleString()}건
                        <span style="color:#64748b; float:right;">${s.searched_at}</span></div>`;
                });
            }
            html += '</div>';
            html += `<div><h4 style="color:#38bdf8; margin-bottom:8px;">🤖 최근 예측 기록</h4>`;
            if (data.predictions.length === 0) {
                html += '<span style="color:#94a3b8; font-size:0.85rem;">기록이 없어요</span>';
            } else {
                data.predictions.forEach(p => {
                    const color = p.risk === 1 ? '#f87171' : '#34d399';
                    html += `<div style="background:#0f172a; padding:8px 12px; border-radius:6px; margin-bottom:6px; font-size:0.85rem;">
                        <strong style="color:#38bdf8">${p.drugname}</strong> + ${p.reaction}
                        → <strong style="color:${color}">${p.risk === 1 ? '⚠️ 위험' : '✅ 비위험'}</strong>
                        <span style="color:#64748b; float:right;">${p.predicted_at}</span></div>`;
                });
            }
            html += '</div></div>';
            document.getElementById('history-content').innerHTML = html;
        });
    }

    // 🔍 자동완성
    function showSuggestions(value, listId, inputId) {
        const list = document.getElementById(listId);
        if (value.length < 2) { list.style.display = 'none'; return; }
        fetch(`/api/autocomplete/${value}`)
        .then(res => res.json())
        .then(data => {
            if (data.suggestions.length === 0) { list.style.display = 'none'; return; }
            list.innerHTML = data.suggestions.map(s =>
                `<div onclick="selectSuggestion('${s}', '${inputId}', '${listId}')"
                      style="padding:10px 16px; cursor:pointer; border-bottom:1px solid #334155; color:#e2e8f0; font-size:0.9rem;"
                      onmouseover="this.style.background='#334155'"
                      onmouseout="this.style.background=''">${s}</div>`
            ).join('');
            list.style.display = 'block';
        });
    }

    function selectSuggestion(value, inputId, listId) {
        document.getElementById(inputId).value = value;
        document.getElementById(listId).style.display = 'none';
    }

    document.addEventListener('click', function(e) {
        ['drug-suggestions', 'pred-drug-suggestions'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
    });
</script>

</body>
</html>
