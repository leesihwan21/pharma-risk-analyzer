<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
        .card h2 { color: #38bdf8; margin-bottom: 8px; font-size: 1.4rem; }
        .card p { color: #64748b; font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.82rem; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; }
        .form-group input:focus { outline: none; border-color: #38bdf8; }
        .btn { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #0ea5e9; }
        .msg { margin-top: 14px; padding: 12px; border-radius: 8px; font-size: 0.88rem; text-align: center; display: none; }
        .msg.success { background: #0f2620; border: 1px solid #059669; color: #34d399; }
        .msg.error { background: #1f0a0a; border: 1px solid #dc2626; color: #f87171; }
        .back { display: block; text-align: center; margin-top: 16px; color: #64748b; font-size: 0.85rem; text-decoration: none; }
        .back:hover { color: #38bdf8; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #0f172a; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 비밀번호 찾기</h2>
        <p>가입 시 사용한 이메일을 입력하면 비밀번호 재설정 링크를 보내드려요.</p>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="email" placeholder="example@gmail.com" onkeydown="if(event.key==='Enter') sendReset()">
        </div>
        <button class="btn" id="btn" onclick="sendReset()">📧 재설정 링크 발송</button>
        <div class="msg" id="msg"></div>
        <a href="/login" class="back">← 로그인으로 돌아가기</a>
    </div>
    <script>
        async function sendReset() {
            const email = document.getElementById('email').value.trim();
            if (!email) { showMsg('이메일을 입력해주세요', 'error'); return; }
            const btn = document.getElementById('btn');
            btn.innerHTML = '<div class="spinner"></div>발송 중...';
            btn.disabled = true;
            try {
                const res = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                const data = await res.json();
                if (res.ok) {
                    showMsg(data.message, 'success');
                    btn.innerHTML = '✅ 발송 완료';
                } else {
                    showMsg(data.error, 'error');
                    btn.innerHTML = '📧 재설정 링크 발송';
                    btn.disabled = false;
                }
            } catch(e) {
                showMsg('오류가 발생했어요', 'error');
                btn.innerHTML = '📧 재설정 링크 발송';
                btn.disabled = false;
            }
        }
        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = `msg ${type}`;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
