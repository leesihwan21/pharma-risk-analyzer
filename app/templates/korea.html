<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 이상사례 - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }

        .header {
            background: #1e293b; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 10px;
        }
        .header h1 { color: #38bdf8; font-size: 1.3rem; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }

        .info-bar {
            background: #1e293b; padding: 12px 24px;
            border-bottom: 1px solid #334155;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
        }
        .badge {
            background: #0f172a; border: 1px solid #334155;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.82rem; color: #94a3b8;
        }
        .badge span { color: #38bdf8; font-weight: bold; }
        .btn-compare {
            background: #7c3aed; color: white;
            padding: 7px 14px; border-radius: 8px;
            text-decoration: none; font-size: 0.85rem;
            font-weight: bold; margin-left: auto;
        }

        /* 차트 그리드 */
        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; padding: 20px 24px;
        }
        .chart-card {
            background: #1e293b; border-radius: 12px;
            padding: 10px; border: 1px solid #334155;
            min-height: 430px; overflow: hidden;
        }
        .chart-full {
            background: #1e293b; border-radius: 12px;
            padding: 10px; border: 1px solid #334155;
            min-height: 430px; overflow: hidden;
            margin: 0 24px 24px;
        }

        /* 태블릿 */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; padding: 14px 16px; gap: 12px; }
            .chart-full { margin: 0 16px 16px; }
            .chart-card, .chart-full { min-height: 320px; }
        }
        /* 모바일 */
        @media (max-width: 480px) {
            .header { padding: 12px 14px; }
            .header h1 { font-size: 1.1rem; }
            .info-bar { padding: 12px 14px; }
            .btn-compare { margin-left: 0; width: 100%; text-align: center; }
            .grid { padding: 12px; }
            .chart-full { margin: 0 12px 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🇰🇷 한국 의약품 이상사례 분석</h1>
    <a href="/dashboard">← 대시보드로</a>
</div>

<div class="info-bar">
    <div class="badge">출처: <span>한국의약품안전관리원 (KIDS)</span></div>
    <div class="badge">기간: <span>2019 ~ 2024</span></div>
    <div class="badge">데이터: <span>연도별 증상별 보고현황</span></div>
    <a href="/korea_vs_us" class="btn-compare">🌍 한국 vs 미국 비교</a>
</div>

<div class="grid">
    <div class="chart-card" id="chart1"></div>
    <div class="chart-card" id="chart2"></div>
</div>

<div class="chart-full" id="chart3"></div>

<script>
    Plotly.newPlot('chart1', JSON.parse('{{ charts.chart1 | safe }}'));
    Plotly.newPlot('chart2', JSON.parse('{{ charts.chart2 | safe }}'));
    Plotly.newPlot('chart3', JSON.parse('{{ charts.chart3 | safe }}'));
</script>
</body>
</html>
