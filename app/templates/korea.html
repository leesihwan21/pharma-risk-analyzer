<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국 이상사례 - Pharma Risk Analyzer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
        .header { background: #1e293b; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
        .header h1 { color: #38bdf8; font-size: 1.5rem; }
        .header a { color: #94a3b8; text-decoration: none; }
        .info-bar { background: #1e293b; padding: 16px 40px; border-bottom: 1px solid #334155; display: flex; gap: 16px; align-items: center; }
        .badge { background: #0f172a; border: 1px solid #334155; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; color: #94a3b8; }
        .badge span { color: #38bdf8; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px 40px; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; min-height: 450px; }
        .chart-full { background: #1e293b; border-radius: 12px; padding: 10px; border: 1px solid #334155; min-height: 450px; margin: 0 40px 30px; }
        .compare-section { padding: 0 40px 30px; }
        .compare-btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🇰🇷 한국 의약품 이상사례 분석</h1>
    <a href="/dashboard">← 대시보드로</a>
</div>

<div class="info-bar">
    <div class="badge">출처: <span>한국의약품안전관리원 (KIDS)</span></div>
    <div class="badge">기간: <span>2019 ~ 2024</span></div>
    <div class="badge">데이터: <span>연도별 증상별 이상사례 보고현황</span></div>
    <a href="/korea_vs_us" style="background:#7c3aed; color:white; padding:8px 16px; border-radius:8px; text-decoration:none; font-size:0.85rem; font-weight:bold; margin-left:auto;">
        🌍 한국 vs 미국 비교
    </a>
</div>

<div class="grid">
    <div class="chart-card" id="chart1"></div>
    <div class="chart-card" id="chart2"></div>
</div>

<div class="chart-full" id="chart3"></div>

<script>
    Plotly.newPlot('chart1', JSON.parse('{{ charts.chart1 | safe }}'));
    Plotly.newPlot('chart2', JSON.parse('{{ charts.chart2 | safe }}'));
    Plotly.newPlot('chart3', JSON.parse('{{ charts.chart3 | safe }}'));
</script>

</body>
</html>
