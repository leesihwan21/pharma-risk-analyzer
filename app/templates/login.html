<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo h1 { color: #38bdf8; font-size: 1.4rem; }
        .logo p { color: #94a3b8; font-size: 0.9rem; margin-top: 8px; }
        .lang-row { display: flex; justify-content: flex-end; margin-bottom: 16px; }
        .lang-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: bold; }
        .lang-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #38bdf8; }
        .btn { width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #0891b2; color: white; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 12px; text-align: center; }
        .success { color: #34d399; font-size: 0.85rem; margin-top: 12px; text-align: center; }
        .link { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.9rem; }
        .link a { color: #38bdf8; text-decoration: none; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #0f172a; border-top: 2px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .card { padding: 28px 20px; } }
    </style>
</head>
<body>
{% include 'nav.html' %}
<div class="card">
    <div class="lang-row">
        <button id="lang-btn" class="lang-btn" onclick="toggleLang()">🇺🇸 EN</button>
    </div>
    <div class="logo">
        <h1>💊 Pharma Risk Analyzer</h1>
        <p data-ko="로그인하고 분석을 시작하세요" data-en="Login to start your analysis">로그인하고 분석을 시작하세요</p>
    </div>
    <div class="form-group">
        <label data-ko="아이디" data-en="Username">아이디</label>
        <input type="text" id="username" data-ko="아이디 입력" data-en="Enter username" placeholder="아이디 입력"/>
    </div>
    <div class="form-group">
        <label data-ko="비밀번호" data-en="Password">비밀번호</label>
        <input type="password" id="password" data-ko="비밀번호 입력" data-en="Enter password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()"/>
    </div>
    <button class="btn" onclick="login()" id="login-btn" data-ko="로그인" data-en="Login">로그인</button>
    <div id="message"></div>
    <div class="link">
        <span data-ko="계정이 없으신가요?" data-en="Don't have an account?">계정이 없으신가요?</span>
        <a href="/register" data-ko="회원가입" data-en="Sign Up">회원가입</a>
    </div>
</div>
<script src="/static/lang.js"></script>
<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const lang = getLang();
        if (!username || !password) {
            document.getElementById('message').innerHTML = `<div class="error">${lang === 'ko' ? '아이디와 비밀번호를 입력해주세요' : 'Please enter username and password'}</div>`; return;
        }
        document.getElementById('login-btn').innerHTML = `<div class="spinner"></div>${lang === 'ko' ? '로그인 중...' : 'Logging in...'}`;
        fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                document.getElementById('message').innerHTML = `<div class="error">❌ ${data.error}</div>`;
                document.getElementById('login-btn').setAttribute('data-ko', '로그인');
                document.getElementById('login-btn').setAttribute('data-en', 'Login');
                applyLang(lang);
            } else {
                document.getElementById('message').innerHTML = `<div class="success">✅ ${data.message}</div>`;
                setTimeout(() => window.location.href = '/dashboard', 1000);
            }
        });
    }
</script>
</body>
</html>
