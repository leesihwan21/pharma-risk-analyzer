<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Risk Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: 2.8rem;
            color: #38bdf8;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .btn-main {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 14px 36px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-main:hover { background: #0ea5e9; }

        /* 기능 카드 */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 48px;
        }
        .feature-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px 12px;
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
        }
        .feature-card .icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }
        .feature-card strong { color: #e2e8f0; display: block; margin-bottom: 4px; font-size: 0.9rem; }

        /* 반응형 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .features { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 400px) {
            h1 { font-size: 1.7rem; }
            .features { grid-template-columns: 1fr; }
            .btn-main { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">FDA FAERS 2024 Q3 · YOLOv8 · ML</div>
        <h1>💊 Pharma Risk<br>Analyzer</h1>
        <p class="subtitle">
            약물 부작용 AI 위험도 분석 시스템<br>
            실제 FDA 데이터 기반 · 머신러닝 예측 · 알약 이미지 탐지
        </p>
        <a href="/dashboard" class="btn-main">대시보드 보기 →</a>

        <div class="features">
            <div class="feature-card">
                <span class="icon">📊</span>
                <strong>대시보드</strong>
                FAERS 통계 시각화
            </div>
            <div class="feature-card">
                <span class="icon">🤖</span>
                <strong>AI 예측</strong>
                위험도 자동 분류
            </div>
            <div class="feature-card">
                <span class="icon">📸</span>
                <strong>알약 탐지</strong>
                YOLOv8 이미지 인식
            </div>
            <div class="feature-card">
                <span class="icon">⚖️</span>
                <strong>약물 비교</strong>
                나란히 비교 분석
            </div>
            <div class="feature-card">
                <span class="icon">📄</span>
                <strong>PDF 리포트</strong>
                자동 보고서 생성
            </div>
            <div class="feature-card">
                <span class="icon">🇰🇷</span>
                <strong>한국 데이터</strong>
                식약처 이상사례
            </div>
        </div>
    </div>
</body>
</html>
